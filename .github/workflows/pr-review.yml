name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    if: '!github.event.pull_request.draft'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Auto Review PR
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for a React Native (Expo) Bitcoin/Runes wallet app. Focus on:

            1. **Security**: Crypto key handling, PSBT signing, buffer operations, injection risks
            2. **Bugs**: Null checks, async/await errors, race conditions, state management issues
            3. **React Native pitfalls**: Memory leaks in effects, missing cleanup, re-render storms
            4. **Bitcoin-specific**: BIP32/39/84/86 compliance, UTXO handling, fee calculation
            5. **Cashu**: Proof management, P2PK operations, token validation

            Skip: style nits, import ordering, minor formatting. Only flag real issues.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` for specific code issues.
            Only post comments — don't output review as messages.

          claude_args: |
            --model claude-sonnet-4-5-20250929
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
