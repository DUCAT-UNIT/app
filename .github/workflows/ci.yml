name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  quality:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || github.token }}
        run: npm ci

      - name: Verify project quality gates
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || github.token }}
        run: npm run verify
