name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Typecheck, Lint & Dead Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 0

      - name: Dead code detection
        run: npx knip
        continue-on-error: true  # Warning mode — will fail-hard after initial baseline
