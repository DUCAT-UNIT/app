name: Security Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'services/cashu/**'
      - 'services/transaction/**'
      - 'services/vault/**'
      - 'services/vaultWallet/**'
      - 'services/passkey/**'
      - 'services/pinHashing.ts'
      - 'services/pinLockout.ts'
      - 'services/secureStorageService.ts'
      - 'services/transactionSigningService.ts'
      - 'utils/wallet/**'

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Security-focused review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            SECURITY REVIEW — This PR modifies critical crypto/auth paths.

            Check for:
            - Private key exposure (logged, stored insecurely, passed to API)
            - PSBT signing issues (wrong sighash, missing input validation)
            - Buffer overflow / underflow in crypto operations
            - Cashu proof manipulation or double-spend vectors
            - PIN/auth bypass possibilities
            - SecureStore misuse (plaintext fallback, missing encryption)
            - Passkey credential handling errors
            - Hardcoded secrets or testnet keys leaking to prod paths

            Only flag confirmed security issues. No style nits.
            Post as inline comments with severity: CRITICAL / HIGH / MEDIUM.

          claude_args: |
            --model claude-sonnet-4-5-20250929
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*)"
