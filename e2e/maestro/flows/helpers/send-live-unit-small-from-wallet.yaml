appId: com.ducatprotocol.DucatProtocolWallet
---
# Submit a tiny live on-chain UNIT send from an already-open reviewer wallet.
# The caller is responsible for importing/unlocking the wallet first.

- extendedWaitUntil:
    visible:
      id: 'wallet-actions'
    timeout: 30000

- tapOn:
    id: 'wallet-send-btn'
- waitForAnimationToEnd
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'withdraw-unit'
    timeout: 10000
- tapOn:
    id: 'withdraw-unit'

- extendedWaitUntil:
    visible:
      id: 'send-input-screen'
    timeout: 10000

- tapOn:
    id: 'send-address-input'
- inputText: 'tb1pqqqqp399et2xygdj5xreqhjjvcmzhxw4aywxecjdzew6hylgvsesf3hn0c'
- runFlow: dismiss-keyboard-prompt.yaml

- extendedWaitUntil:
    visible:
      text: 'Valid'
    timeout: 10000

- tapOn:
    id: 'unit-send-amount-display'
- extendedWaitUntil:
    visible:
      id: 'unit-send-amount-input'
    timeout: 5000
- eraseText
- inputText: '0.01'
- tapOn:
    id: 'unit-send-amount-done-btn'
- waitForAnimationToEnd

# The real on-chain send must not route through TurboUNIT here.
- tapOn:
    id: 'send-turbo-toggle'
- waitForAnimationToEnd

- runFlow: dismiss-debug-warning.yaml
- tapOn:
    id: 'send-review-btn'

- extendedWaitUntil:
    visible:
      id: 'review-screen'
    timeout: 120000
- assertVisible:
    text: 'You will send'

- tapOn:
    id: 'review-confirm-btn'

- extendedWaitUntil:
    visible:
      id: 'confirmation-screen'
    timeout: 180000
- assertVisible:
    text: 'Transaction Sent!'
- runFlow: dismiss-debug-warning.yaml
- tapOn:
    id: 'confirmation-copy-txid-btn'
