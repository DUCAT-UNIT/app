appId: com.ducatprotocol.DucatProtocolWallet
---
# Import the funded reviewer wallet without creating a vault.

- runFlow: clear-and-launch.yaml

- tapOn:
    id: 'welcome-restore-wallet-btn'

- runFlow:
    when:
      visible:
        id: 'welcome-screen'
    commands:
      - tapOn:
          id: 'welcome-restore-wallet-btn'

- extendedWaitUntil:
    visible:
      id: 'restore-choice-screen'
    timeout: 5000
- tapOn:
    id: 'restore-seed-phrase-btn'

- assertVisible:
    id: 'import-wallet-screen'
- tapOn:
    id: 'import-paste-btn'
- extendedWaitUntil:
    visible:
      text: 'Allow Paste'
    timeout: 5000
- tapOn:
    text: 'Allow Paste'

- extendedWaitUntil:
    visible:
      text: '12/12'
    timeout: 5000
- waitForAnimationToEnd
- runFlow: submit-import-wallet-if-visible.yaml

- extendedWaitUntil:
    visible:
      id: 'pin-setup-title'
    timeout: 30000
- runFlow: enter-pin-setup.yaml
- extendedWaitUntil:
    visible:
      text: 'Confirm Your PIN'
    timeout: 10000
- runFlow: enter-pin-setup.yaml
- runFlow: retry-pin-setup-if-mismatch.yaml

- runFlow:
    when:
      visible:
        id: 'biometric-modal'
    commands:
      - tapOn:
          id: 'biometric-skip-btn'

- runFlow: unlock-if-locked.yaml
- runFlow: dismiss-airdrop.yaml
- runFlow: dismiss-low-ecash.yaml

- runFlow:
    when:
      visible:
        text: 'Skip for Now'
    commands:
      - tapOn:
          text: 'Skip for Now'
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'wallet-screen'
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: 'balance-section'
    timeout: 30000

# This can appear after the wallet home has already mounted and would block
# the first tap in transaction flows.
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: 'Skip for Now'
    commands:
      - tapOn:
          text: 'Skip for Now'
      - waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: 'Skip for Now'
    commands:
      - tapOn:
          text: 'Skip for Now'
      - waitForAnimationToEnd
