appId: com.ducatprotocol.DucatProtocolWallet
---
# Import wallet using E2E bypass (empty seed fields → uses default test seed)
# This imports the abandon...about wallet without needing clipboard

- runFlow: clear-and-launch.yaml
- tapOn:
    id: "welcome-restore-wallet-btn"

# Restore choice screen (wait for navigation)
- extendedWaitUntil:
    visible:
      id: "restore-choice-screen"
    timeout: 5000
- tapOn:
    id: "restore-seed-phrase-btn"

# Import wallet screen - tap import without entering words (E2E bypass)
- assertVisible:
    id: "import-wallet-screen"

# Scroll down to reveal import button
- scrollUntilVisible:
    element:
      id: "import-wallet-btn"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "import-wallet-btn"

# PIN setup - wait longer for key derivation
- extendedWaitUntil:
    visible:
      id: "pin-setup-title"
    timeout: 30000
- runFlow: enter-pin-setup.yaml
- runFlow: enter-pin-setup.yaml

# Skip biometric if prompted
- runFlow:
    when:
      visible:
        id: "biometric-modal"
    commands:
      - tapOn:
          id: "biometric-skip-btn"

# Skip passkey migration if prompted
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Dismiss airdrop modal if it appears
- runFlow: dismiss-airdrop.yaml

# Dismiss low ecash balance modal if it appears
- runFlow: dismiss-low-ecash.yaml

# Verify wallet screen loads
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
