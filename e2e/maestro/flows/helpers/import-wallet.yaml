appId: com.ducatprotocol.DucatProtocolWallet
---
# Import the default abandon...about wallet through the visible seed inputs.

- runFlow: clear-and-launch.yaml
- tapOn:
    id: "welcome-restore-wallet-btn"

# Restore choice screen (wait for navigation)
- extendedWaitUntil:
    visible:
      id: "restore-choice-screen"
    timeout: 5000
- tapOn:
    id: "restore-seed-phrase-btn"

# Import wallet screen
- runFlow: type-default-seed.yaml
- runFlow: submit-import-wallet-if-visible.yaml

# PIN setup - wait longer for key derivation
- extendedWaitUntil:
    visible:
      id: "pin-setup-title"
    timeout: 30000
- runFlow: enter-pin-setup.yaml
- extendedWaitUntil:
    visible:
      text: "Confirm Your PIN"
    timeout: 10000
- runFlow: enter-pin-setup.yaml
- runFlow: retry-pin-setup-if-mismatch.yaml

# Skip biometric if prompted
- runFlow:
    when:
      visible:
        id: "biometric-modal"
    commands:
      - tapOn:
          id: "biometric-skip-btn"

# Skip passkey recovery if prompted
- runFlow: dismiss-passkey-recovery.yaml

# Dismiss airdrop modal if it appears
- runFlow: dismiss-airdrop.yaml

# Dismiss low ecash balance modal if it appears
- runFlow: dismiss-low-ecash.yaml

# Verify wallet screen loads
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- waitForAnimationToEnd
- runFlow: dismiss-passkey-recovery.yaml
- waitForAnimationToEnd
- runFlow: dismiss-passkey-recovery.yaml
