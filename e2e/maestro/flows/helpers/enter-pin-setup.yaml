appId: com.ducatprotocol.DucatProtocolWallet
---
- extendedWaitUntil:
    visible:
      id: "pin-keypad-1"
    timeout: 10000
- tapOn:
    id: "pin-keypad-1"
- tapOn:
    id: "pin-keypad-2"
- tapOn:
    id: "pin-keypad-3"
- tapOn:
    id: "pin-keypad-4"
- tapOn:
    id: "pin-keypad-5"
- tapOn:
    id: "pin-keypad-6"
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: "lock-keypad-1"
    commands:
      - tapOn:
          id: "lock-keypad-1"
      - tapOn:
          id: "lock-keypad-2"
      - tapOn:
          id: "lock-keypad-3"
      - tapOn:
          id: "lock-keypad-4"
      - tapOn:
          id: "lock-keypad-5"
      - tapOn:
          id: "lock-keypad-6"
