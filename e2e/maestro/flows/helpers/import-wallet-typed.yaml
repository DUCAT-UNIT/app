appId: com.ducatprotocol.DucatProtocolWallet
---
# Import wallet using E2E bypass (auto-fills test seed when tapping Import with empty fields)
# No clipboard dependency — more reliable than paste-based approach

- runFlow: clear-and-launch.yaml

# Wait a bit more for welcome screen to be fully interactive
- waitForAnimationToEnd

# Tap restore button — first tap may dismiss Expo Dev Client overlay
- tapOn:
    id: "welcome-restore-wallet-btn"
- waitForAnimationToEnd

# If overlay intercepted first tap, we're still on welcome screen — retry
- runFlow:
    when:
      visible:
        id: "welcome-screen"
    commands:
      - tapOn:
          id: "welcome-restore-wallet-btn"
      - waitForAnimationToEnd

# Restore choice screen
- extendedWaitUntil:
    visible:
      id: "restore-choice-screen"
    timeout: 10000
- tapOn:
    id: "restore-seed-phrase-btn"

# Import wallet screen — E2E bypass auto-fills seed when tapping Import with empty fields
- assertVisible:
    id: "import-wallet-screen"
- scrollUntilVisible:
    element:
      id: "import-wallet-btn"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "import-wallet-btn"
- waitForAnimationToEnd

# PIN setup - enter PIN twice (import + key derivation can take time)
- extendedWaitUntil:
    visible:
      id: "pin-setup-title"
    timeout: 30000
- runFlow: enter-pin-setup.yaml
- runFlow: enter-pin-setup.yaml

# Skip biometric if prompted
- runFlow:
    when:
      visible:
        id: "biometric-modal"
    commands:
      - tapOn:
          id: "biometric-skip-btn"

# Skip passkey migration if prompted
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Dismiss airdrop modal if it appears
- runFlow: dismiss-airdrop.yaml

# Dismiss low ecash balance modal if it appears
- runFlow: dismiss-low-ecash.yaml

# Verify wallet screen loads
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
