appId: com.ducatprotocol.DucatProtocolWallet
---
# Create a fresh wallet, fund it via airdrop, create a vault, and wait for on-chain confirmation
# After this helper completes:
#   - Wallet has remaining BTC (~half of airdrop)
#   - Wallet has UNIT (from vault borrow)
#   - Vault exists with BTC collateral and UNIT debt
#   - Borrow/Repay buttons are enabled
#   - isPendingVaultTx = false
# Takes ~3-4 minutes total (airdrop + vault creation + confirmation wait)

# Step 1: Create wallet and wait for airdrop BTC
- runFlow: create-wallet.yaml

# Wait for wallet to be fully interactive
- waitForAnimationToEnd
- waitForAnimationToEnd

# Step 2: Scroll to vault card and create vault
- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "create-vault-btn"
    timeout: 5000
- tapOn:
    id: "create-vault-btn"

# Wait for vault amounts screen
- extendedWaitUntil:
    visible:
      id: "vault-amounts-screen"
    timeout: 10000

# Enter explicit deposit and borrow amounts through the visible amount editors.
- tapOn:
    id: "vault-create-btc-display"
- extendedWaitUntil:
    visible:
      id: "vault-create-btc-input"
    timeout: 5000
- eraseText
- inputText: "0.05000000"
- tapOn:
    id: "vault-create-btc-done-btn"
- waitForAnimationToEnd
- tapOn:
    id: "vault-create-borrow-usd-display"
- extendedWaitUntil:
    visible:
      id: "vault-create-borrow-usd-input"
    timeout: 5000
- tapOn:
    id: "vault-create-borrow-usd-input"
- eraseText
- inputText: "1200"
- pressKey: Enter
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-borrow-usd-input"
    commands:
      - tapOn:
          text: "Done"
      - waitForAnimationToEnd
- extendedWaitUntil:
    notVisible:
      id: "vault-create-borrow-usd-input"
    timeout: 5000
- runFlow: dismiss-debug-warning.yaml

# Continue to payout selection
- extendedWaitUntil:
    visible:
      id: "vault-create-continue-btn"
    timeout: 5000
- tapOn:
    id: "vault-create-continue-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-amounts-screen"
    commands:
      - scrollUntilVisible:
          element:
            id: "vault-create-continue-btn"
          direction: DOWN
          timeout: 5000
      - tapOn:
          id: "vault-create-continue-btn"
      - waitForAnimationToEnd
- runFlow: dismiss-debug-warning.yaml
- runFlow:
    when:
      visible:
        id: "vault-amounts-screen"
    commands:
      - tapOn:
          id: "vault-create-continue-btn"
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "vault-create-payout-unit-card"
    timeout: 10000

# Deterministic vault helper keeps issued value as on-chain UNIT.
- scrollUntilVisible:
    element:
      id: "vault-create-payout-unit-card"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "vault-create-payout-unit-card"
- tapOn:
    id: "vault-create-payout-continue-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          text: "Continue"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          point: "50%,93%"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          point: "50%,95%"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "vault-create-confirm-screen"
    timeout: 10000

# Confirm & Sign
- tapOn:
    id: "vault-create-confirm-btn"
- runFlow:
    when:
      visible:
        id: "pin-fallback-modal"
    commands:
      - runFlow: enter-pin-fallback.yaml

# Wait for success (skip transient processing screen)
- extendedWaitUntil:
    visible:
      id: "vault-create-success-screen"
    timeout: 120000
- assertVisible:
    id: "vault-success-done-btn"

# Tap Done to return to wallet
- tapOn:
    id: "vault-success-done-btn"
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000

# Step 3: Wait for vault creation tx to confirm on Mutinynet (~30-90 seconds)
# When unconfirmed: vault-overlay (Create Vault button) is shown over vault card
# When confirmed: vault-overlay disappears and vault data shows (hasVault=true)
# The app polls every 10s and auto-clears isPendingVaultTx when confirmed
- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000
- extendedWaitUntil:
    notVisible:
      id: "vault-overlay"
    timeout: 120000

# Step 4: Wait for Runes UNIT balance to appear in wallet
# Ord indexer lags behind vault API — may take 1-3 minutes after block confirmation
# With accessible={false} in E2E mode, Maestro sees individual text elements inside AssetCard
# The amount text has testID="asset-card-unit-amount" — check it shows non-zero value
# When Runes balance is 0: amount text is "0.00"
# When available: amount text is "548.25" (non-zero, varies per run)
- swipe:
    start: "50%, 30%"
    end: "50%, 80%"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "asset-card-unit"
    direction: DOWN
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "asset-card-unit-amount"
      text: "^1,200\\.00$"
    timeout: 180000

# Scroll back to top for the test to interact with wallet actions
- swipe:
    start: "50%, 30%"
    end: "50%, 80%"
- waitForAnimationToEnd
- waitForAnimationToEnd
