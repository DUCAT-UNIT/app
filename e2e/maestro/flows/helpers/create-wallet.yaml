appId: com.ducatprotocol.DucatProtocolWallet
---
# Create a fresh wallet with airdrop funding
# clearState → welcome → passkey PIN (enter + confirm) → airdrop → wallet
# Each test gets a unique wallet with fresh BTC from Mutinynet airdrop

- runFlow: clear-and-launch.yaml

# Wait for welcome screen to be fully interactive
- waitForAnimationToEnd

# Tap create button — first tap may dismiss Expo Dev Client overlay
- tapOn:
    id: 'welcome-create-wallet-btn'

# If overlay intercepted first tap, we're still on welcome screen — retry
- runFlow:
    when:
      visible:
        id: 'welcome-screen'
    commands:
      - tapOn:
          id: 'welcome-create-wallet-btn'

# PasskeyPinInput screen — enter 6-digit PIN
- extendedWaitUntil:
    visible:
      id: 'pin-setup-screen'
    timeout: 30000

# Enter PIN (111111)
- runFlow: enter-pin-setup.yaml

# Confirm PIN (111111 again)
- extendedWaitUntil:
    visible:
      text: 'Confirm Your PIN'
    timeout: 10000
- runFlow: enter-pin-setup.yaml
- runFlow: retry-pin-setup-if-mismatch.yaml

# Skip biometric if prompted
- runFlow:
    when:
      visible:
        id: 'biometric-modal'
    commands:
      - tapOn:
          id: 'biometric-skip-btn'

# Skip passkey recovery if prompted
- runFlow: dismiss-passkey-recovery.yaml

# A fresh live wallet should receive faucet BTC before we continue. The funding
# modal can be skipped by the app when the balance arrives first, so dismiss it
# opportunistically and let the funded wallet actions be the required gate.
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow: dismiss-airdrop.yaml
- waitForAnimationToEnd
- runFlow: unlock-if-locked.yaml
- runFlow: dismiss-airdrop.yaml
- waitForAnimationToEnd

# Dismiss low ecash modal if it appears
- runFlow: dismiss-low-ecash.yaml
- waitForAnimationToEnd
- runFlow: dismiss-airdrop.yaml
- waitForAnimationToEnd

# Notification prompt can appear before funded wallet actions are queryable.
- runFlow:
    when:
      visible:
        text: 'Activate Notifications'
    commands:
      - tapOn:
          text: 'Not Now'
      - waitForAnimationToEnd

# Wait for the funded wallet home to become interactive.
- extendedWaitUntil:
    visible:
      text: 'Create Vault'
    timeout: 180000
- runFlow:
    when:
      visible:
        text: 'Activate Notifications'
    commands:
      - tapOn:
          text: 'Not Now'
      - waitForAnimationToEnd
- runFlow: dismiss-airdrop.yaml

# Force defaults again now that the authenticated settings provider is mounted.
# This updates live auto-lock/feature-flag state, not only persisted storage.
- openLink: 'ducat://e2e/reset-settings'
- runFlow: accept-open-in-app-alert.yaml
- runFlow: unlock-if-locked.yaml
- extendedWaitUntil:
    visible:
      text: 'Create Vault'
    timeout: 15000
- waitForAnimationToEnd
