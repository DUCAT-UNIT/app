appId: com.ducatprotocol.DucatProtocolWallet
---
# Create a fresh wallet with airdrop funding
# clearState → welcome → passkey PIN (enter + confirm) → airdrop → wallet
# Each test gets a unique wallet with fresh BTC from Mutinynet airdrop

- runFlow: clear-and-launch.yaml

# Wait for welcome screen to be fully interactive
- waitForAnimationToEnd

# Tap create button — first tap may dismiss Expo Dev Client overlay
- tapOn:
    id: 'welcome-create-wallet-btn'

# If overlay intercepted first tap, we're still on welcome screen — retry
- runFlow:
    when:
      visible:
        id: 'welcome-screen'
    commands:
      - tapOn:
          id: 'welcome-create-wallet-btn'

# PasskeyPinInput screen — enter 6-digit PIN
- extendedWaitUntil:
    visible:
      id: 'pin-setup-screen'
    timeout: 30000

# Enter PIN (111111)
- runFlow: enter-pin-setup.yaml

# Confirm PIN (111111 again)
- extendedWaitUntil:
    visible:
      text: 'Confirm Your PIN'
    timeout: 10000
- runFlow: enter-pin-setup.yaml
- runFlow: retry-pin-setup-if-mismatch.yaml

# Skip biometric if prompted
- runFlow:
    when:
      visible:
        id: 'biometric-modal'
    commands:
      - tapOn:
          id: 'biometric-skip-btn'

# Skip passkey migration if prompted
- runFlow:
    when:
      visible:
        id: 'passkey-migration-modal'
    commands:
      - tapOn:
          id: 'passkey-skip-btn'

# A fresh live wallet should receive a faucet response before we wait for the
# funded BTC card. Wait for the funding modal once so it cannot appear later and
# cover the wallet-screen assertion.
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow: unlock-if-locked.yaml

# Accept airdrop once it appears. Tapping "Get Started" dismisses the success modal.
- extendedWaitUntil:
    visible:
      text: 'Get Started'
    timeout: 45000
- tapOn:
    text: 'Get Started'
- waitForAnimationToEnd
- runFlow: unlock-if-locked.yaml

# Dismiss low ecash modal if it appears
- runFlow: dismiss-low-ecash.yaml

# Passkey prompt can appear a little later on fresh wallet creation
- runFlow:
    when:
      visible:
        id: 'passkey-migration-modal'
    commands:
      - tapOn:
          id: 'passkey-skip-btn'

# Verify wallet screen loads
- extendedWaitUntil:
    visible:
      id: 'wallet-screen'
    timeout: 15000

# This prompt can appear slightly later, after the wallet home mounts.
- runFlow:
    when:
      visible:
        id: 'passkey-migration-modal'
    commands:
      - tapOn:
          id: 'passkey-skip-btn'

# Wait for balance section to appear
- extendedWaitUntil:
    visible:
      id: 'balance-section'
    timeout: 30000

# Dismiss any delayed passkey prompt before continuing the funded-wallet flow.
- runFlow:
    when:
      visible:
        id: 'passkey-migration-modal'
    commands:
      - tapOn:
          id: 'passkey-skip-btn'

# Wait for the funded BTC card to render in the live wallet UI.
# The exact decimal formatting changes over time, so do not pin this to one string.
- extendedWaitUntil:
    visible:
      id: 'asset-card-btc'
    timeout: 90000
- extendedWaitUntil:
    visible:
      text: "^(0\\.0*[1-9]\\d*|[1-9][\\d,]*\\.\\d{8})$"
    timeout: 180000

# Force defaults again now that the authenticated settings provider is mounted.
# This updates live auto-lock/feature-flag state, not only persisted storage.
- openLink: 'ducat://e2e/reset-settings'
- runFlow: accept-open-in-app-alert.yaml
- runFlow: unlock-if-locked.yaml
- extendedWaitUntil:
    visible:
      id: 'wallet-screen'
    timeout: 15000
