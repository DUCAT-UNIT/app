appId: com.ducatprotocol.DucatProtocolWallet
---
# Best-effort dismiss for common iOS system alerts during E2E
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: "Don’t Allow"
          commands:
            - tapOn:
                text: "Don’t Allow"
      - runFlow:
          when:
            visible:
              text: "Don't Allow"
          commands:
            - tapOn:
                text: "Don't Allow"
      - runFlow:
          when:
            visible:
              text: "Not Now"
          commands:
            - tapOn:
                text: "Not Now"
      - runFlow:
          when:
            visible:
              text: "Later"
          commands:
            - tapOn:
                text: "Later"
      - runFlow:
          when:
            visible:
              text: "Allow"
          commands:
            - tapOn:
                text: "Allow"
      - runFlow:
          when:
            visible:
              text: "Allow Once"
          commands:
            - tapOn:
                text: "Allow Once"
      - runFlow:
          when:
            visible:
              text: "Allow While Using App"
          commands:
            - tapOn:
                text: "Allow While Using App"
      - runFlow:
          when:
            visible:
              text: "OK"
          commands:
            - tapOn:
                text: "OK"
      - runFlow:
          when:
            visible:
              text: "Continue"
          commands:
            - tapOn:
                text: "Continue"
      - runFlow:
          when:
            visible:
              text: "Cancel"
          commands:
            - tapOn:
                text: "Cancel"
