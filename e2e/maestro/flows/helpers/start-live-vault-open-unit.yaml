appId: com.ducatprotocol.DucatProtocolWallet
---
# Create a fresh live wallet, submit a vault open, and stop on the success screen.

- runFlow: create-wallet.yaml

- waitForAnimationToEnd
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "create-vault-btn"
    timeout: 10000
- tapOn:
    id: "create-vault-btn"

- extendedWaitUntil:
    visible:
      id: "vault-amounts-screen"
    timeout: 10000
- tapOn:
    id: "vault-create-btc-display"
- extendedWaitUntil:
    visible:
      id: "vault-create-btc-input"
    timeout: 5000
- eraseText
- inputText: "0.05000000"
- tapOn:
    id: "vault-create-btc-done-btn"
- waitForAnimationToEnd

- tapOn:
    id: "vault-create-borrow-usd-display"
- extendedWaitUntil:
    visible:
      id: "vault-create-borrow-usd-input"
    timeout: 5000
- eraseText
- inputText: "1200"
- pressKey: Enter
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-borrow-usd-input"
    commands:
      - tapOn:
          text: "Done"
      - waitForAnimationToEnd
- runFlow: dismiss-debug-warning.yaml

- extendedWaitUntil:
    visible:
      id: "vault-create-continue-btn"
    timeout: 5000
- tapOn:
    id: "vault-create-continue-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-amounts-screen"
    commands:
      - scrollUntilVisible:
          element:
            id: "vault-create-continue-btn"
          direction: DOWN
          timeout: 5000
      - tapOn:
          id: "vault-create-continue-btn"
      - waitForAnimationToEnd
- runFlow: dismiss-debug-warning.yaml

- extendedWaitUntil:
    visible:
      id: "vault-create-payout-unit-card"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "vault-create-payout-unit-card"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "vault-create-payout-unit-card"
- tapOn:
    id: "vault-create-payout-continue-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          text: "Continue"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "vault-create-confirm-screen"
    timeout: 10000
- tapOn:
    id: "vault-create-confirm-btn"
- runFlow:
    when:
      visible:
        id: "pin-fallback-modal"
    commands:
      - runFlow: enter-pin-fallback.yaml

- extendedWaitUntil:
    visible:
      id: "vault-create-success-screen"
    timeout: 180000
