appId: com.ducatprotocol.DucatProtocolWallet
---
# Create a fresh wallet without waiting for faucet funding.
# The app still runs its real airdrop behavior; this helper only avoids making
# funded balance a gate for UI-only coverage.

- runFlow: clear-and-launch.yaml

- tapOn:
    id: 'welcome-create-wallet-btn'

- runFlow:
    when:
      visible:
        id: 'welcome-screen'
    commands:
      - tapOn:
          id: 'welcome-create-wallet-btn'

- extendedWaitUntil:
    visible:
      id: 'pin-setup-screen'
    timeout: 30000

- runFlow: enter-pin-setup.yaml

- extendedWaitUntil:
    visible:
      text: 'Confirm Your PIN'
    timeout: 10000
- runFlow: enter-pin-setup.yaml
- runFlow: retry-pin-setup-if-mismatch.yaml

- runFlow:
    when:
      visible:
        id: 'biometric-modal'
    commands:
      - tapOn:
          id: 'biometric-skip-btn'

- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow: unlock-if-locked.yaml
- runFlow: dismiss-passkey-recovery.yaml
- runFlow: unlock-if-locked.yaml
- runFlow: dismiss-passkey-recovery.yaml
- runFlow: dismiss-airdrop.yaml
- runFlow: dismiss-low-ecash.yaml

- extendedWaitUntil:
    visible:
      id: 'wallet-screen'
    timeout: 15000
- waitForAnimationToEnd
- runFlow: dismiss-passkey-recovery.yaml
