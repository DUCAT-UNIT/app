appId: com.ducatprotocol.DucatProtocolWallet
---
# Assert a submitted vault operation does not leave the wallet stuck after
# process death. Chain confirmation may clear the pending lock before Maestro
# observes the transient pending banner, so the durable assertion is that vault
# controls become usable again.

- runFlow:
    when:
      visible:
        id: "wallet-vault-actions-pending"
    commands:
      - extendedWaitUntil:
          visible:
            id: "wallet-vault-actions-ready"
          timeout: 300000

- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000
- extendedWaitUntil:
    notVisible:
      id: "vault-overlay"
    timeout: 300000
- extendedWaitUntil:
    visible:
      id: "wallet-vault-actions-ready"
    timeout: 300000
