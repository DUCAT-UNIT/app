appId: com.ducatprotocol.DucatProtocolWallet
---
# Send Invalid Address - Verify address validation on send screen
# Funded wallet → withdraw → BTC → type invalid address → verify error

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen (wait for import to fully complete)
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Skip passkey migration if it appears late
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Wait for wallet actions to load
- extendedWaitUntil:
    visible:
      id: "wallet-actions"
    timeout: 15000

# Open send BTC screen
- tapOn:
    id: "wallet-withdraw-btn"
- extendedWaitUntil:
    visible:
      id: "withdraw-btc"
    timeout: 5000
- tapOn:
    id: "withdraw-btc"

# Verify send input screen loads
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "send-input-screen"
    timeout: 10000

# Tap the address input field
- extendedWaitUntil:
    visible:
      text: "Recipient Bitcoin address.*"
    timeout: 5000
- tapOn:
    text: "Recipient Bitcoin address.*"
- inputText: "invalidaddress123"

# Dismiss keyboard to trigger validation
- hideKeyboard

# Verify address error appears
- extendedWaitUntil:
    visible:
      text: "Invalid"
    timeout: 5000
