appId: com.ducatprotocol.DucatProtocolWallet
---
# Send Review Screen - Enter address and QTR amount, reach review screen
# Funded wallet → send BTC → address → QTR → review screen

- runFlow: ../helpers/import-wallet-typed.yaml

- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml

- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Wait for wallet actions
- extendedWaitUntil:
    visible:
      id: "wallet-actions"
    timeout: 15000

# Open send BTC screen
- tapOn:
    id: "wallet-withdraw-btn"
- extendedWaitUntil:
    visible:
      id: "withdraw-btc"
    timeout: 5000
- tapOn:
    id: "withdraw-btc"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "send-input-screen"
    timeout: 10000

# Enter address
- extendedWaitUntil:
    visible:
      text: "Recipient Bitcoin address.*"
    timeout: 5000
- tapOn:
    text: "Recipient Bitcoin address.*"
- inputText: "tb1qw508d6qejxtdg4y5r3zarvary0c5xw7kxpjzsx"
- hideKeyboard
- extendedWaitUntil:
    visible:
      text: "Valid"
    timeout: 5000

# Select QTR amount
- tapOn:
    id: "btc-slider-quarter-btn"
- waitForAnimationToEnd

# Tap review button
- extendedWaitUntil:
    visible:
      text: "Review transaction"
    timeout: 5000
- tapOn:
    text: "Review transaction"
- extendedWaitUntil:
    visible:
      id: "review-screen"
    timeout: 10000

# Verify review screen content
- assertVisible:
    text: "Confirm and Sign"
