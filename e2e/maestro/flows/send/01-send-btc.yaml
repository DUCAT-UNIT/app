appId: com.ducatprotocol.DucatProtocolWallet
---
# Deposit BTC - Verify deposit sheet opens and BTC receive screen loads
# Import wallet → tap deposit → select BTC → verify receive screen

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Tap deposit button - opens deposit sheet
- tapOn:
    id: "wallet-deposit-btn"

# Select BTC from deposit sheet
- extendedWaitUntil:
    visible:
      id: "deposit-btc"
    timeout: 5000
- tapOn:
    id: "deposit-btc"

# Wait for navigation then verify receive screen loaded
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Only use this address to receive Bitcoin."
    timeout: 10000
