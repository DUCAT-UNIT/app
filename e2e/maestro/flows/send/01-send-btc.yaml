appId: com.ducatprotocol.DucatProtocolWallet
---
# Send BTC - Verify withdraw sheet opens and send screen loads
# Import wallet → tap withdraw → select BTC → verify send screen

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Tap withdraw button - opens withdraw sheet
- tapOn:
    id: "wallet-withdraw-btn"

# Select BTC from withdraw sheet
- extendedWaitUntil:
    visible:
      id: "withdraw-btc"
    timeout: 5000
- tapOn:
    id: "withdraw-btc"

# Verify send input screen loads
- extendedWaitUntil:
    visible:
      id: "send-input-screen"
    timeout: 5000
