appId: com.ducatprotocol.DucatProtocolWallet
---
# Send BTC to Review Screen - Verify full send flow through review
# Funded wallet → withdraw → BTC → enter address → verify review button state

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Wait for wallet actions to load
- extendedWaitUntil:
    visible:
      id: "wallet-actions"
    timeout: 15000

# Open send BTC screen
- tapOn:
    id: "wallet-withdraw-btn"
- extendedWaitUntil:
    visible:
      id: "withdraw-btc"
    timeout: 5000
- tapOn:
    id: "withdraw-btc"

# Verify send input screen loads
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "send-input-screen"
    timeout: 10000
- assertVisible:
    text: "Send BTC"

# Tap address input field
- extendedWaitUntil:
    visible:
      text: "Recipient Bitcoin address.*"
    timeout: 5000
- tapOn:
    text: "Recipient Bitcoin address.*"
- inputText: "tb1qw508d6qejxtdg4y5r3zarvary0c5xw7kxpjzsx"

# Dismiss keyboard
- hideKeyboard

# Wait for address validation
- extendedWaitUntil:
    visible:
      text: "Valid"
    timeout: 5000

# Verify we're on the send screen with valid address
# (Review button is rendered but Maestro can't see text inside disabled Pressable+Animated.View)
- assertVisible:
    text: "Send BTC"
- assertVisible:
    text: "Valid"
