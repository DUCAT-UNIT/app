appId: com.ducatprotocol.DucatProtocolWallet
---
# Send BTC Full Review - Enter address + select amount + reach review screen
# Funded wallet → withdraw → BTC → address → 25% amount → review → verify details

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Skip passkey migration if it appears
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Wait for wallet actions to load
- extendedWaitUntil:
    visible:
      id: "wallet-actions"
    timeout: 15000

# Open send BTC screen
- tapOn:
    id: "wallet-withdraw-btn"
- extendedWaitUntil:
    visible:
      id: "withdraw-btc"
    timeout: 5000
- tapOn:
    id: "withdraw-btc"

# Verify send input screen loads
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "send-input-screen"
    timeout: 10000

# Tap address input field
- extendedWaitUntil:
    visible:
      text: "Recipient Bitcoin address.*"
    timeout: 5000
- tapOn:
    text: "Recipient Bitcoin address.*"
- inputText: "tb1qw508d6qejxtdg4y5r3zarvary0c5xw7kxpjzsx"
- hideKeyboard

# Wait for address validation
- extendedWaitUntil:
    visible:
      text: "Valid"
    timeout: 5000

# Select 25% amount using preset button
- tapOn:
    id: "btc-slider-quarter-btn"
- waitForAnimationToEnd

# Tap review button
- extendedWaitUntil:
    visible:
      text: "Review transaction"
    timeout: 5000
- tapOn:
    text: "Review transaction"

# Verify review screen loads
- extendedWaitUntil:
    visible:
      id: "review-screen"
    timeout: 10000

# Verify review screen has correct elements
- assertVisible:
    text: "You will send"
- assertVisible:
    text: "Confirm and Sign"
- assertVisible:
    text: "Cancel"

# Verify transaction details section is shown
- assertVisible:
    text: "Transaction details"
