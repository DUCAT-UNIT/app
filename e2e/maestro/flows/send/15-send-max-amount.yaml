appId: com.ducatprotocol.DucatProtocolWallet
---
# Send MAX Amount - Verify MAX preset button works on send screen
# Funded wallet → send BTC → address → MAX → verify on screen

- runFlow: ../helpers/import-wallet-typed.yaml

- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml

- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Wait for wallet actions
- extendedWaitUntil:
    visible:
      id: "wallet-actions"
    timeout: 15000

# Open send BTC
- tapOn:
    id: "wallet-withdraw-btn"
- extendedWaitUntil:
    visible:
      id: "withdraw-btc"
    timeout: 5000
- tapOn:
    id: "withdraw-btc"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "send-input-screen"
    timeout: 10000

# Enter address
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Recipient Bitcoin address.*"
    timeout: 5000
- tapOn:
    text: "Recipient Bitcoin address.*"
- inputText: "tb1qw508d6qejxtdg4y5r3zarvary0c5xw7kxpjzsx"
- hideKeyboard
- waitForAnimationToEnd

# Wait for address validation
- extendedWaitUntil:
    visible:
      text: "Valid"
    timeout: 5000

# Tap MAX preset using testID
- tapOn:
    id: "btc-slider-max-btn"
- waitForAnimationToEnd

# Verify still on send screen
- assertVisible:
    id: "send-input-screen"
- assertVisible:
    text: "Send BTC"
