appId: com.ducatprotocol.DucatProtocolWallet
---
# Send BTC Complete - Full BTC send flow to confirmation
# Fresh wallet (airdrop funded) → withdraw → BTC → address → QTR amount → review → confirm → success

- runFlow: ../helpers/create-wallet.yaml

# Wait for wallet to be fully interactive
- waitForAnimationToEnd
- waitForAnimationToEnd

# Wait for wallet actions to load
- extendedWaitUntil:
    visible:
      id: "wallet-actions"
    timeout: 15000

# Open send BTC screen
- tapOn:
    id: "wallet-send-btn"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "withdraw-btc"
    timeout: 10000
- tapOn:
    id: "withdraw-btc"

# Verify send input screen loads
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "send-input-screen"
    timeout: 10000

# Enter a valid testnet address
- extendedWaitUntil:
    visible:
      text: "Recipient Bitcoin address.*"
    timeout: 5000
- tapOn:
    text: "Recipient Bitcoin address.*"
- inputText: "tb1qw508d6qejxtdg4y5r3zarvary0c5xw7kxpjzsx"

# Wait for address validation
- extendedWaitUntil:
    visible:
      text: "Valid"
    timeout: 5000

# Enter a small BTC amount through the visible amount editor.
- tapOn:
    id: "btc-send-amount-display"
- extendedWaitUntil:
    visible:
      id: "btc-send-amount-input"
    timeout: 5000
- eraseText
- inputText: "0.00001000"
- tapOn:
    id: "btc-send-amount-done-btn"
- waitForAnimationToEnd

# Tap review button
- extendedWaitUntil:
    visible:
      id: "send-review-btn"
    timeout: 5000
- runFlow: ../helpers/tap-send-review.yaml

# Wait for review screen
- extendedWaitUntil:
    visible:
      id: "review-screen"
    timeout: 10000
- assertVisible:
    text: "You will send"

# Confirm and sign
- tapOn:
    text: "Confirm and Sign"

# Wait for confirmation screen (processing screen may flash too quickly to catch)
- extendedWaitUntil:
    visible:
      id: "confirmation-screen"
    timeout: 120000

# Verify success
- assertVisible:
    text: "Transaction Sent!"

# Tap Done and verify we return to wallet
- tapOn:
    id: "confirmation-done-btn"
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000
