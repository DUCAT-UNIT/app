appId: com.ducatprotocol.DucatProtocolWallet
---
# Send UNIT Flow - Verify UNIT send screen loads and address validation works
# Funded wallet → withdraw → UNIT → verify screen → type address → verify valid

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Skip passkey migration if it appears
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Wait for wallet actions
- extendedWaitUntil:
    visible:
      id: "wallet-actions"
    timeout: 15000

# Open send UNIT screen
- tapOn:
    id: "wallet-withdraw-btn"
- extendedWaitUntil:
    visible:
      id: "withdraw-unit"
    timeout: 5000
- tapOn:
    id: "withdraw-unit"

# Verify send input screen loads with UNIT
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "send-input-screen"
    timeout: 10000
- assertVisible:
    text: "Send UNIT"
