appId: com.ducatprotocol.DucatProtocolWallet
---
# Send UNIT - Verify withdraw sheet shows UNIT option and send screen loads
# Import wallet → tap withdraw → select UNIT → verify send screen

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Tap withdraw button - opens withdraw sheet
- tapOn:
    id: "wallet-withdraw-btn"

# Select UNIT from withdraw sheet
- extendedWaitUntil:
    visible:
      id: "withdraw-unit"
    timeout: 5000
- tapOn:
    id: "withdraw-unit"

# Verify send input screen loads
- extendedWaitUntil:
    visible:
      id: "send-input-screen"
    timeout: 5000
