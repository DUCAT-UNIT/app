appId: com.ducatprotocol.DucatProtocolWallet
---
# Asset Detail - Verify tapping UNIT card opens asset detail
# Import wallet → tap UNIT card → verify detail screen

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Tap on UNIT asset card
- tapOn:
    id: "asset-card-unit"

# Verify navigation to asset detail
- extendedWaitUntil:
    visible:
      text: "UNIT"
    timeout: 5000
