appId: com.ducatprotocol.DucatProtocolWallet
---
# Action Buttons - Verify all wallet action buttons are visible and tappable
# Import wallet → verify all 4 action buttons exist

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Verify all action buttons exist
- assertVisible:
    id: "wallet-repay-btn"
- assertVisible:
    id: "wallet-borrow-btn"
- assertVisible:
    id: "wallet-withdraw-btn"
- assertVisible:
    id: "wallet-deposit-btn"
