appId: com.ducatprotocol.DucatProtocolWallet
---
# Vault Creation Flow - Full vault creation through UI screens
# Fresh wallet → scroll to vault → select amounts → confirm → processing → success

- runFlow: ../helpers/create-wallet.yaml

- waitForAnimationToEnd
- waitForAnimationToEnd

# Scroll to vault card
- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000

# Verify vault overlay (no vault yet)
- extendedWaitUntil:
    visible:
      id: "create-vault-btn"
    timeout: 5000

# Open vault creation
- tapOn:
    id: "create-vault-btn"

# Verify vault amounts screen
- extendedWaitUntil:
    visible:
      id: "vault-amounts-screen"
    timeout: 10000

# Use max BTC deposit from the real slider controls
- tapOn:
    id: "btc-slider-max-btn"
- waitForAnimationToEnd

# Prime the borrow slider, then edit down to a valid live USD amount
- tapOn:
    id: "unit-slider-max-btn"
- waitForAnimationToEnd
- tapOn:
    id: "vault-create-borrow-usd-display"
- extendedWaitUntil:
    visible:
      id: "vault-create-borrow-usd-input"
    timeout: 5000
- tapOn:
    id: "vault-create-borrow-usd-input"
- eraseText
- inputText: "4900"
- pressKey: Enter
- waitForAnimationToEnd

# Continue to confirm
- runFlow:
    when:
      visible:
        text: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
      - waitForAnimationToEnd
- tapOn:
    id: "vault-create-continue-btn"

# Verify confirm screen
- extendedWaitUntil:
    visible:
      id: "vault-create-confirm-screen"
    timeout: 10000
- assertVisible:
    text: "Confirm Vault"

# Confirm & Sign
- runFlow:
    when:
      visible:
        text: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
      - waitForAnimationToEnd
- tapOn:
    id: "vault-create-confirm-btn"

# Wait for success (skip transient processing screen)
- extendedWaitUntil:
    visible:
      id: "vault-create-success-screen"
    timeout: 120000
- assertVisible:
    text: "Vault Created!"

# Tap Done
- tapOn:
    id: "vault-success-done-btn"

# Verify back on wallet
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000
