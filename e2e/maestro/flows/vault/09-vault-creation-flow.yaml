appId: com.ducatprotocol.DucatProtocolWallet
---
# Vault Creation Flow - Full vault creation through UI screens
# Fresh wallet → scroll to vault → select amounts → confirm → processing → success

- runFlow: ../helpers/create-wallet.yaml

- waitForAnimationToEnd
- waitForAnimationToEnd

# Scroll to vault card
- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000

# Verify vault overlay (no vault yet)
- extendedWaitUntil:
    visible:
      id: "create-vault-btn"
    timeout: 5000

# Open vault creation
- tapOn:
    id: "create-vault-btn"

# Verify vault amounts screen
- extendedWaitUntil:
    visible:
      id: "vault-amounts-screen"
    timeout: 10000

# Use max BTC deposit from the real slider controls
- tapOn:
    id: "btc-slider-max-btn"
- waitForAnimationToEnd

# Use the visible borrow MAX control for a valid live USD amount.
- tapOn:
    id: "unit-slider-max-btn"
- waitForAnimationToEnd

# Continue to payout selection
- tapOn:
    point: "92%,84%"
- waitForAnimationToEnd
- tapOn:
    id: "vault-create-continue-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-amounts-screen"
    commands:
      - tapOn:
          point: "50%,98%"
      - waitForAnimationToEnd

# Keep the maintained deterministic create-vault flow on on-chain UNIT.
- scrollUntilVisible:
    element:
      id: "vault-create-payout-unit-card"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "vault-create-payout-unit-card"
- tapOn:
    id: "vault-create-payout-continue-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          text: "Continue"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          point: "50%,93%"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          point: "50%,95%"
      - waitForAnimationToEnd

# Verify confirm screen
- extendedWaitUntil:
    visible:
      id: "vault-create-confirm-screen"
    timeout: 10000
- assertVisible:
    text: "Confirm Vault"

# Confirm & Sign
- runFlow:
    when:
      visible:
        text: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
      - waitForAnimationToEnd
- tapOn:
    id: "vault-create-confirm-btn"
- runFlow:
    when:
      visible:
        id: "pin-fallback-modal"
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

# Wait for success (skip transient processing screen)
- extendedWaitUntil:
    visible:
      id: "vault-create-success-screen"
    timeout: 120000

# Tap Done
- tapOn:
    id: "vault-success-done-btn"

# Verify back on wallet
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000
