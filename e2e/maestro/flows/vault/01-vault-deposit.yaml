appId: com.ducatprotocol.DucatProtocolWallet
---
# Vault Deposit (Create Vault) - Deposit BTC into a new vault
# Fresh wallet → scroll to vault card → Create Vault → HALF BTC → confirm → success

- runFlow: ../helpers/create-wallet.yaml

# Wait for wallet to be fully interactive
- waitForAnimationToEnd
- waitForAnimationToEnd

# Scroll down to vault card
- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000

# Tap Create Vault button (overlay on vault card for new wallets)
- extendedWaitUntil:
    visible:
      id: "create-vault-btn"
    timeout: 5000
- tapOn:
    id: "create-vault-btn"

# Wait for vault amounts screen
- extendedWaitUntil:
    visible:
      id: "vault-amounts-screen"
    timeout: 10000
- assertVisible:
    text: "Create Vault"

# Enter explicit collateral, then use the visible borrow MAX control.
- tapOn:
    id: "vault-create-btc-display"
- extendedWaitUntil:
    visible:
      id: "vault-create-btc-input"
    timeout: 5000
- eraseText
- inputText: "0.05000000"
- tapOn:
    id: "vault-create-btc-done-btn"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "unit-slider-max-btn"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "unit-slider-max-btn"
- waitForAnimationToEnd

# Tap Continue to payout selection
- tapOn:
    point: "92%,84%"
- waitForAnimationToEnd
- tapOn:
    id: "vault-create-continue-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-amounts-screen"
    commands:
      - tapOn:
          point: "50%,98%"
      - waitForAnimationToEnd

# Keep the maintained deterministic create-vault flow on on-chain UNIT.
- scrollUntilVisible:
    element:
      id: "vault-create-payout-unit-card"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "vault-create-payout-unit-card"
- tapOn:
    id: "vault-create-payout-continue-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          text: "Continue"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          point: "50%,93%"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "vault-create-payout-unit-card"
    commands:
      - tapOn:
          point: "50%,95%"
      - waitForAnimationToEnd

# Wait for confirm screen
- extendedWaitUntil:
    visible:
      id: "vault-create-confirm-screen"
    timeout: 10000

# Confirm & Sign
- tapOn:
    id: "vault-create-confirm-btn"
- runFlow:
    when:
      visible:
        id: "pin-fallback-modal"
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

# Wait for success (skip transient processing screen)
- extendedWaitUntil:
    visible:
      id: "vault-create-success-screen"
    timeout: 120000

# Tap Done and verify wallet screen
- tapOn:
    id: "vault-success-done-btn"
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000
