appId: com.ducatprotocol.DucatProtocolWallet
---
# Vault - Verify asset card navigation to BTC detail
# Import wallet → tap BTC card → verify asset detail screen

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Tap on BTC asset card
- tapOn:
    id: "asset-card-btc"

# Verify navigation to asset detail (screen may vary based on navigation setup)
- extendedWaitUntil:
    visible:
      text: "Bitcoin"
    timeout: 5000
