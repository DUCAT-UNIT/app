appId: com.ducatprotocol.DucatProtocolWallet
---
# Withdraw Sheet Options - Verify withdraw sheet shows both BTC send and vault withdraw options
# Funded wallet → tap withdraw → verify both withdraw-btc and withdraw-vault options visible

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Wait for balance to load
- extendedWaitUntil:
    visible:
      id: "balance-section"
    timeout: 30000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Wait for wallet actions
- extendedWaitUntil:
    visible:
      id: "wallet-actions"
    timeout: 15000

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Dismiss passkey migration modal if it appears
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Tap Withdraw button to open sheet
- tapOn:
    id: "wallet-withdraw-btn"

# Verify withdraw-btc option is visible in the sheet
- extendedWaitUntil:
    visible:
      id: "withdraw-btc"
    timeout: 5000

# Verify withdraw-vault option may or may not be visible (depends on wallet state)
# Just verify we got the sheet open with at least BTC option
- waitForAnimationToEnd
