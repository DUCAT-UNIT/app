appId: com.ducatprotocol.DucatProtocolWallet
---
# Vault Card Visible - Verify vault card is displayed on wallet with health percentage
# Funded wallet → scroll to vault card → verify vault info and health percentage text

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Wait for balance to load
- extendedWaitUntil:
    visible:
      id: "balance-section"
    timeout: 30000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Dismiss passkey migration modal if it appears
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Scroll to vault card
- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000

# Verify vault card is visible
- assertVisible:
    id: "vault-card"

# Verify BTC and UNIT asset cards are also visible
- assertVisible:
    id: "asset-card-btc"
- assertVisible:
    id: "asset-card-unit"
