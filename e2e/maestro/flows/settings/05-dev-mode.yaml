appId: com.ducatprotocol.DucatProtocolWallet
---
# Developer Mode - Toggle dev mode on and verify cashu settings appears
# Import wallet → settings → advanced → toggle dev mode → back → verify cashu btn

- runFlow: ../helpers/import-wallet-typed.yaml

# Navigate to settings
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open advanced
- tapOn:
    id: "settings-advanced-btn"
- extendedWaitUntil:
    visible:
      id: "advanced-screen"
    timeout: 5000

# Toggle developer mode ON
- tapOn:
    id: "advanced-dev-mode-btn"

# Verify account switching option appears (only visible in dev mode)
- extendedWaitUntil:
    visible:
      id: "advanced-switch-account-btn"
    timeout: 3000

# Go back to settings
- tapOn:
    id: "advanced-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Verify Turbo UNIT settings button now visible (only in dev mode)
- assertVisible:
    id: "settings-cashu-btn"
