appId: com.ducatprotocol.DucatProtocolWallet
---
# Developer Mode - Toggle dev mode on and verify advanced-only controls
# Import wallet → settings → advanced → toggle dev mode → verify account switching, back → verify Cashu remains hidden

- runFlow: ../helpers/import-wallet-typed.yaml

# Navigate to settings
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow: ../helpers/dismiss-passkey-recovery.yaml
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open advanced
- tapOn:
    id: "settings-advanced-btn"
- extendedWaitUntil:
    visible:
      id: "advanced-screen"
    timeout: 5000

# Toggle developer mode ON
- tapOn:
    id: "advanced-dev-mode-btn"

# Verify account switching option appears (only visible in dev mode)
- extendedWaitUntil:
    visible:
      id: "advanced-switch-account-btn"
    timeout: 3000

# Go back to settings
- tapOn:
    id: "advanced-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Turbo Cashu remains hidden even in dev mode.
- assertNotVisible:
    id: "settings-cashu-btn"
