appId: com.ducatprotocol.DucatProtocolWallet
---
# About - Navigate through about, terms, and privacy screens
# Import wallet → settings → about → terms → back → privacy → back → back

- runFlow: ../../helpers/import-wallet.yaml

# Navigate to settings
- assertVisible:
    id: "wallet-screen"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open about
- tapOn:
    id: "settings-about-btn"
- extendedWaitUntil:
    visible:
      id: "about-screen"
    timeout: 5000

# Verify about options
- assertVisible:
    id: "about-terms-btn"
- assertVisible:
    id: "about-privacy-btn"
- assertVisible:
    id: "about-version"

# Open Terms of Service
- tapOn:
    id: "about-terms-btn"
- extendedWaitUntil:
    visible:
      id: "terms-of-service-screen"
    timeout: 5000

# Go back to about
- tapOn:
    id: "terms-back-btn"
- extendedWaitUntil:
    visible:
      id: "about-screen"
    timeout: 5000

# Open Privacy Policy
- tapOn:
    id: "about-privacy-btn"
- extendedWaitUntil:
    visible:
      id: "privacy-policy-screen"
    timeout: 5000

# Go back to about
- tapOn:
    id: "privacy-back-btn"
- extendedWaitUntil:
    visible:
      id: "about-screen"
    timeout: 5000
