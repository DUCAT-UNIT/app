appId: com.ducatprotocol.DucatProtocolWallet
---
# Navigate Settings - Verify settings menu items visible
# Import wallet → open settings → verify menu items

- runFlow: ../../helpers/import-wallet.yaml

# Navigate to settings
- runFlow: ../../helpers/navigate-to-settings.yaml

# Verify settings menu items are visible
- assertVisible:
    id: "settings-screen"
- assertVisible:
    id: "settings-preferences-btn"
- assertVisible:
    id: "settings-security-btn"
- assertVisible:
    id: "settings-advanced-btn"
- assertVisible:
    id: "settings-about-btn"
- assertVisible:
    id: "settings-lock-btn"

# Navigate to security screen
- tapOn:
    id: "settings-security-btn"
- assertVisible:
    id: "security-screen"
- assertVisible:
    id: "security-biometric-btn"
- assertVisible:
    id: "security-change-pin-btn"
- assertVisible:
    id: "security-backup-btn"

# Go back to settings
- tapOn:
    id: "security-back-btn"
- assertVisible:
    id: "settings-screen"

# Go back to wallet
- tapOn:
    id: "settings-back-btn"
- assertVisible:
    id: "wallet-screen"
