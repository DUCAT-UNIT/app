appId: com.ducatprotocol.DucatProtocolWallet
---
# Preferences - Navigate to preferences and verify toggle options
# Import wallet → settings → preferences → verify options → back

- runFlow: ../../helpers/import-wallet.yaml

# Navigate to settings
- assertVisible:
    id: "wallet-screen"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open preferences
- tapOn:
    id: "settings-preferences-btn"
- extendedWaitUntil:
    visible:
      id: "preferences-screen"
    timeout: 5000

# Verify preference options exist
- assertVisible:
    id: "preferences-zero-assets-btn"
- assertVisible:
    id: "preferences-notifications-btn"

# Go back to settings
- tapOn:
    id: "preferences-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
