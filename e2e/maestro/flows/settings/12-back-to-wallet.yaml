appId: com.ducatprotocol.DucatProtocolWallet
---
# Back to Wallet - Verify settings back button returns to wallet screen
# Import wallet → settings → back → verify wallet screen

- runFlow: ../../helpers/import-wallet.yaml

# Navigate to settings
- assertVisible:
    id: "wallet-screen"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Go back to wallet
- tapOn:
    id: "settings-back-btn"

# Verify wallet screen returns
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 5000

# Verify wallet elements are still visible
- assertVisible:
    id: "balance-section"
- assertVisible:
    id: "asset-card-btc"
