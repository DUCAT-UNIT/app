appId: com.ducatprotocol.DucatProtocolWallet
---
# Preferences Notifications - Verify settings preferences navigation works
# Import wallet → settings → verify preferences option exists

- runFlow: ../helpers/import-wallet-typed.yaml

# Navigate to settings
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"
- tapOn:
    id: "wallet-settings-btn"

# If PIN lock appears, enter the PIN
- extendedWaitUntil:
    visible:
      id: "pin-keypad-1"
    timeout: 3000
    optional: true
- runFlow:
    when:
      visible:
        id: "pin-keypad-1"
    commands:
      - runFlow: ../helpers/enter-pin-lock.yaml

# Wait for settings screen
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000

# Verify preferences button exists
- assertVisible:
    id: "settings-preferences-btn"

# Verify security button exists
- assertVisible:
    id: "settings-security-btn"
