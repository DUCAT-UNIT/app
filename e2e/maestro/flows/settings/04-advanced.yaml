appId: com.ducatprotocol.DucatProtocolWallet
---
# Advanced - Navigate to advanced settings and verify options
# Import wallet → settings → advanced → verify options → back

- runFlow: ../../helpers/import-wallet.yaml

# Navigate to settings
- assertVisible:
    id: "wallet-screen"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open advanced
- tapOn:
    id: "settings-advanced-btn"
- extendedWaitUntil:
    visible:
      id: "advanced-screen"
    timeout: 5000

# Verify advanced options exist
- assertVisible:
    id: "advanced-dev-mode-btn"
- assertVisible:
    id: "advanced-ecash-threshold-btn"

# Go back to settings
- tapOn:
    id: "advanced-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
