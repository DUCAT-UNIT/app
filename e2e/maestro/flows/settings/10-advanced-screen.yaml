appId: com.ducatprotocol.DucatProtocolWallet
---
# Advanced Screen - Verify advanced settings screen loads with all options
# Import wallet → settings → advanced → verify dev mode + ecash threshold

- runFlow: ../helpers/import-wallet-typed.yaml

# Navigate to settings
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow: ../helpers/dismiss-passkey-recovery.yaml
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Navigate to advanced
- tapOn:
    id: "settings-advanced-btn"
- extendedWaitUntil:
    visible:
      id: "advanced-screen"
    timeout: 5000

# Verify advanced screen content
- assertVisible:
    id: "advanced-dev-mode-btn"
- assertVisible:
    id: "advanced-ecash-threshold-btn"

# Developer-only USDC unlock appears only after developer mode is enabled
- assertNotVisible:
    id: "advanced-enable-usdc-btn"
- tapOn:
    id: "advanced-dev-mode-btn"
- extendedWaitUntil:
    visible:
      id: "advanced-enable-usdc-btn"
    timeout: 5000
- assertVisible:
    id: "advanced-enable-usdc-btn"
- assertVisible:
    id: "advanced-operation-journal-panel"

# Go back to settings
- tapOn:
    id: "advanced-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
