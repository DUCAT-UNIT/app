appId: com.ducatprotocol.DucatProtocolWallet
---
# Cashu Settings - Enable dev mode then navigate to Turbo UNIT settings
# Import wallet → settings → advanced → dev mode → back → cashu settings → verify options

- runFlow: ../../helpers/import-wallet.yaml

# Navigate to settings
- assertVisible:
    id: "wallet-screen"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Enable dev mode first
- tapOn:
    id: "settings-advanced-btn"
- extendedWaitUntil:
    visible:
      id: "advanced-screen"
    timeout: 5000
- tapOn:
    id: "advanced-dev-mode-btn"
- tapOn:
    id: "advanced-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open Turbo UNIT (cashu) settings
- tapOn:
    id: "settings-cashu-btn"
- extendedWaitUntil:
    visible:
      id: "cashu-settings-screen"
    timeout: 5000

# Verify all cashu settings options
- assertVisible:
    id: "cashu-recover-locked-btn"
- assertVisible:
    id: "cashu-recover-mint-btn"
- assertVisible:
    id: "cashu-redeem-token-btn"
- assertVisible:
    id: "cashu-remove-proofs-btn"
- assertVisible:
    id: "cashu-clear-tokens-btn"
- assertVisible:
    id: "cashu-clear-cache-btn"

# Go back
- tapOn:
    id: "cashu-settings-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
