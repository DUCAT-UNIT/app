appId: com.ducatprotocol.DucatProtocolWallet
---
# Toggle Preferences - Toggle show zero assets and verify toggle works
# Import wallet → settings → preferences → toggle zero assets → back

- runFlow: ../helpers/import-wallet-typed.yaml

# Navigate to settings
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open preferences
- tapOn:
    id: "settings-preferences-btn"
- extendedWaitUntil:
    visible:
      id: "preferences-screen"
    timeout: 5000

# Toggle show zero assets (this is a simple toggle, no modal)
- tapOn:
    id: "preferences-zero-assets-btn"

# Verify we're still on preferences screen
- assertVisible:
    id: "preferences-screen"

# Go back to settings
- tapOn:
    id: "preferences-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
