appId: com.ducatprotocol.DucatProtocolWallet
---
# Change PIN - Navigate to security and initiate PIN change
# Import wallet → settings → security → change PIN → enter current → enter new × 2

- runFlow: ../helpers/import-wallet-typed.yaml

# Navigate to settings → security
- runFlow: ../helpers/navigate-to-settings.yaml
- tapOn:
    id: "settings-security-btn"
- assertVisible:
    id: "security-screen"

# Tap change PIN
- tapOn:
    id: "security-change-pin-btn"

# Enter current PIN (123456)
- runFlow: ../helpers/enter-pin-lock.yaml

# Enter new PIN (654321) twice
- tapOn:
    id: "pin-keypad-6"
- tapOn:
    id: "pin-keypad-5"
- tapOn:
    id: "pin-keypad-4"
- tapOn:
    id: "pin-keypad-3"
- tapOn:
    id: "pin-keypad-2"
- tapOn:
    id: "pin-keypad-1"

# Confirm new PIN
- tapOn:
    id: "pin-keypad-6"
- tapOn:
    id: "pin-keypad-5"
- tapOn:
    id: "pin-keypad-4"
- tapOn:
    id: "pin-keypad-3"
- tapOn:
    id: "pin-keypad-2"
- tapOn:
    id: "pin-keypad-1"

# Verify returns to security screen
- extendedWaitUntil:
    visible:
      id: "security-screen"
    timeout: 10000
