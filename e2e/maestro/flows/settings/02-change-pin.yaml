appId: com.ducatprotocol.DucatProtocolWallet
---
# Change PIN with Re-Verification - Change PIN then verify it actually works
# Import wallet → settings → security → change PIN → lock wallet → unlock with new PIN → change back

- runFlow: ../helpers/import-wallet-typed.yaml

# Navigate to settings → security
- runFlow: ../helpers/navigate-to-settings.yaml
- tapOn:
    id: "settings-security-btn"
- assertVisible:
    id: "security-screen"

# Tap change PIN
- tapOn:
    id: "security-change-pin-btn"

# Enter current PIN (111111)
- runFlow: ../helpers/enter-pin-lock.yaml

# Enter new PIN (654321) twice
- runFlow: ../helpers/enter-pin-reverse-setup.yaml

# Confirm new PIN
- extendedWaitUntil:
    visible:
      text: "Confirm New PIN"
    timeout: 10000
- runFlow: ../helpers/enter-pin-reverse-setup.yaml

# Verify returns to security screen
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "settings-screen"
    commands:
      - tapOn:
          id: "settings-security-btn"
      - extendedWaitUntil:
          visible:
            id: "security-screen"
          timeout: 10000
- extendedWaitUntil:
    visible:
      id: "security-screen"
    timeout: 60000

# === RE-VERIFICATION: Lock wallet and unlock with new PIN ===

# Navigate back to settings screen (lock button is on settings, not security)
- tapOn:
    id: "security-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Tap lock wallet
- tapOn:
    id: "settings-lock-btn"

# Confirmation modal appears - tap Lock button
- extendedWaitUntil:
    visible:
      text: "Lock"
    timeout: 3000
- tapOn:
    text: "Lock"

# Verify we're at lock screen
- extendedWaitUntil:
    visible:
      id: "lock-screen"
    timeout: 5000

# Enter NEW PIN (654321) to verify it works
- runFlow: ../helpers/enter-pin-reverse-lock.yaml

# Verify wallet screen loads (new PIN works!)
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss modals that may appear after unlock
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# === CLEANUP: Change PIN back to 111111 for other tests ===
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
- tapOn:
    id: "settings-security-btn"
- assertVisible:
    id: "security-screen"
- tapOn:
    id: "security-change-pin-btn"

# Enter current PIN (654321 — the one we just set)
- runFlow: ../helpers/enter-pin-reverse-lock.yaml

# Enter original PIN (111111) twice to restore
- runFlow: ../helpers/enter-pin-setup.yaml

# Confirm original PIN
- extendedWaitUntil:
    visible:
      text: "Confirm New PIN"
    timeout: 10000
- runFlow: ../helpers/enter-pin-setup.yaml
- runFlow: ../helpers/retry-pin-setup-if-mismatch.yaml

# Verify returns to security screen (cleanup complete)
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "settings-screen"
    commands:
      - tapOn:
          id: "settings-security-btn"
      - extendedWaitUntil:
          visible:
            id: "security-screen"
          timeout: 10000
- extendedWaitUntil:
    visible:
      id: "security-screen"
    timeout: 60000
