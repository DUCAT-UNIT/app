appId: com.ducatprotocol.DucatProtocolWallet
---
# Toggle Biometric - Verify biometric toggle UI in security settings
# Import wallet → settings → security → tap biometric → verify toggle state

- runFlow: ../helpers/import-wallet-typed.yaml

# Navigate to security settings
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
- tapOn:
    id: "settings-security-btn"
- extendedWaitUntil:
    visible:
      id: "security-screen"
    timeout: 5000

# Wait for screen to settle
- waitForAnimationToEnd

# Verify we're on security screen with key options visible
- assertVisible:
    id: "security-screen"

# Verify Change PIN option is present
- assertVisible:
    text: "Change PIN"

# Verify Backup Wallet option is present
- assertVisible:
    text: "Backup Wallet"

# Verify Delete Wallet option is present
- assertVisible:
    text: "Delete Wallet"
