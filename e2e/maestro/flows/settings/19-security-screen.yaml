appId: com.ducatprotocol.DucatProtocolWallet
---
# Security Screen - Navigate to security screen and verify options
# Import wallet → settings → security → verify options → back

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml

- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Navigate to settings
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open security screen
- tapOn:
    id: "settings-security-btn"
- extendedWaitUntil:
    visible:
      id: "security-screen"
    timeout: 5000

# Verify security options are visible
- assertVisible:
    id: "security-change-pin-btn"
- assertVisible:
    id: "security-biometric-btn"
- assertVisible:
    id: "security-backup-btn"

# Go back to settings
- tapOn:
    id: "security-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
