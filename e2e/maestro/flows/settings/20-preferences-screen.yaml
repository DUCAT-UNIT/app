appId: com.ducatprotocol.DucatProtocolWallet
---
# Preferences Screen - Navigate to preferences and verify options
# Import wallet → settings → preferences → verify options → back

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml

- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Navigate to settings
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open preferences screen
- tapOn:
    id: "settings-preferences-btn"
- extendedWaitUntil:
    visible:
      id: "preferences-screen"
    timeout: 5000

# Verify preference options are visible
- assertVisible:
    id: "preferences-zero-assets-btn"

# Go back to settings
- tapOn:
    id: "preferences-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
