appId: com.ducatprotocol.DucatProtocolWallet
---
# Security Options - Verify all security screen options are present
# Import wallet → settings → security → verify all options → back

- runFlow: ../../helpers/import-wallet.yaml

# Navigate to settings
- assertVisible:
    id: "wallet-screen"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open security
- tapOn:
    id: "settings-security-btn"
- extendedWaitUntil:
    visible:
      id: "security-screen"
    timeout: 5000

# Verify all security options exist
- assertVisible:
    id: "security-biometric-btn"
- assertVisible:
    id: "security-change-pin-btn"
- assertVisible:
    id: "security-backup-btn"
- assertVisible:
    id: "security-delete-btn"

# Go back to settings
- tapOn:
    id: "security-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
