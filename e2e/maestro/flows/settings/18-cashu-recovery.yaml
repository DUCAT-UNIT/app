appId: com.ducatprotocol.DucatProtocolWallet
---
# Cashu Recovery - Verify Cashu recovery buttons are visible
# Import wallet → settings → enable dev mode → cashu settings → verify recovery options → back

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Dismiss passkey migration modal if it appears
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Navigate to settings
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Enable dev mode first (required to see cashu settings)
- tapOn:
    id: "settings-advanced-btn"
- extendedWaitUntil:
    visible:
      id: "advanced-screen"
    timeout: 5000
- tapOn:
    id: "advanced-dev-mode-btn"
- tapOn:
    id: "advanced-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open Turbo UNIT (cashu) settings
- tapOn:
    id: "settings-cashu-btn"
- extendedWaitUntil:
    visible:
      id: "cashu-settings-screen"
    timeout: 5000

# Verify recovery options are visible
- assertVisible:
    id: "cashu-recover-locked-btn"
- assertVisible:
    id: "cashu-recover-mint-btn"

# Go back to settings
- tapOn:
    id: "cashu-settings-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
