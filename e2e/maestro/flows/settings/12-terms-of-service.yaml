appId: com.ducatprotocol.DucatProtocolWallet
---
# Terms of Service - Navigate to Terms of Service screen and verify
# Import wallet → settings → about → terms of service → verify → back

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Dismiss passkey migration modal if it appears
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Navigate to settings
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Navigate to about
- tapOn:
    id: "settings-about-btn"
- extendedWaitUntil:
    visible:
      id: "about-screen"
    timeout: 5000

# Tap Terms of Service
- tapOn:
    id: "about-terms-btn"

# Verify Terms of Service screen loads
- extendedWaitUntil:
    visible:
      id: "terms-of-service-screen"
    timeout: 10000
- assertVisible:
    text: "Terms of Service"

# Go back to about screen
- tapOn:
    id: "terms-back-btn"
- extendedWaitUntil:
    visible:
      id: "about-screen"
    timeout: 5000
