appId: com.ducatprotocol.DucatProtocolWallet
---
# Lock Wallet - Verify lock wallet locks and PIN unlock restores wallet access
# Import wallet → settings → lock → confirm → verify lock screen → enter PIN → verify wallet loads

- runFlow: ../helpers/import-wallet-typed.yaml

# Navigate to settings
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Tap lock wallet
- tapOn:
    id: "settings-lock-btn"

# Confirmation modal appears - tap Lock button
- extendedWaitUntil:
    visible:
      text: "Lock"
    timeout: 3000
- tapOn:
    text: "Lock"

# Verify we're at lock screen
- extendedWaitUntil:
    visible:
      id: "lock-screen"
    timeout: 5000

# Verify lock keypad is present
- assertVisible:
    id: "lock-keypad"

# === UNLOCK: Enter PIN (111111) to verify lock/unlock cycle ===
- runFlow: ../helpers/enter-pin-lock.yaml

# Verify wallet screen loads after unlock
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss modals that may re-appear after unlock
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml

# Verify wallet is fully functional (balance section loaded)
- extendedWaitUntil:
    visible:
      id: "balance-section"
    timeout: 15000
