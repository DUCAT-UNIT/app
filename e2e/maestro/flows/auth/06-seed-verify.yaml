appId: com.ducatprotocol.DucatProtocolWallet
---
# Seed Verify - Verify seed verification screen loads after seed display
# clearState → welcome → create → intro → seed display → seed verify screen

- launchApp:
    clearState: true
    clearKeychain: true
- runFlow: ../../helpers/dismiss-dev-client.yaml

# Welcome screen
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-create-wallet-btn"

# Wallet Created Intro screen
- extendedWaitUntil:
    visible:
      id: "intro-screen"
    timeout: 30000
- tapOn:
    id: "intro-continue-btn"

# Seed phrase display
- assertVisible:
    id: "seed-display-screen"
- tapOn:
    id: "seed-display-continue-btn"

# Seed verification screen
- assertVisible:
    id: "seed-verify-screen"
- assertVisible:
    id: "seed-verify-btn"
- assertVisible:
    id: "seed-verify-cancel-btn"
