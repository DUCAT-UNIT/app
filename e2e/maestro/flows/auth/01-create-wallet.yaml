appId: com.ducatprotocol.DucatProtocolWallet
---
# Create Wallet - Seed phrase creation flow (E2E mode bypasses passkeys)
# clearState → welcome → intro → seed display → verify (bypassed) → PIN → wallet

- runFlow: ../helpers/clear-and-launch.yaml

# Tap create button — first tap may dismiss Expo Dev Client overlay
- tapOn:
    id: "welcome-create-wallet-btn"

# If overlay intercepted first tap, we're still on welcome screen — retry
- runFlow:
    when:
      visible:
        id: "welcome-screen"
    commands:
      - tapOn:
          id: "welcome-create-wallet-btn"

# Wallet Created Intro screen (wallet generation may take a few seconds)
- extendedWaitUntil:
    visible:
      id: "intro-screen"
    timeout: 30000
- tapOn:
    id: "intro-continue-btn"

# Seed phrase display
- assertVisible:
    id: "seed-display-screen"
- tapOn:
    id: "seed-display-continue-btn"

# Seed verification - tap verify (E2E bypass auto-passes)
- assertVisible:
    id: "seed-verify-screen"
- tapOn:
    id: "seed-verify-btn"

# PIN setup - enter PIN twice
- assertVisible:
    id: "pin-setup-title"
- runFlow: ../helpers/enter-pin-setup.yaml
- runFlow: ../helpers/enter-pin-setup.yaml

# Skip biometric if prompted
- runFlow:
    when:
      visible:
        id: "biometric-modal"
    commands:
      - tapOn:
          id: "biometric-skip-btn"

# Skip passkey migration if prompted
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Verify wallet screen loads (may take time after PIN setup)
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
