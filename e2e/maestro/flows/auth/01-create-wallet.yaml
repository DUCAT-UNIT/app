appId: com.ducatprotocol.DucatProtocolWallet
---
# Create Wallet - Seed phrase creation flow (E2E mode bypasses passkeys)
# clearState → welcome → intro → seed display → verify (bypassed) → PIN → wallet

- launchApp:
    clearState: true
    clearKeychain: true
- runFlow: ../../helpers/dismiss-dev-client.yaml

# Welcome screen
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-create-wallet-btn"

# Wallet Created Intro screen (wallet generation may take a few seconds)
- extendedWaitUntil:
    visible:
      id: "intro-screen"
    timeout: 30000
- tapOn:
    id: "intro-continue-btn"

# Seed phrase display
- assertVisible:
    id: "seed-display-screen"
- tapOn:
    id: "seed-display-continue-btn"

# Seed verification - tap verify (E2E bypass auto-passes)
- assertVisible:
    id: "seed-verify-screen"
- tapOn:
    id: "seed-verify-btn"

# PIN setup - enter PIN twice
- assertVisible:
    id: "pin-setup-title"
- runFlow: ../../helpers/enter-pin-setup.yaml
- runFlow: ../../helpers/enter-pin-setup.yaml

# Skip biometric if prompted
- runFlow:
    when:
      visible:
        id: "biometric-modal"
    commands:
      - tapOn:
          id: "biometric-skip-btn"

# Verify wallet screen loads
- assertVisible:
    id: "wallet-screen"
