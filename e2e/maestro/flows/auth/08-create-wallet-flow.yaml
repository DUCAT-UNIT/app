appId: com.ducatprotocol.DucatProtocolWallet
---
# Create Wallet Flow - Verify create wallet path through seed display
# Clear state → welcome → create → intro → seed display → verify seed area visible

- runFlow: ../helpers/clear-and-launch.yaml

# Tap create button — first tap may dismiss Expo Dev Client overlay
- tapOn:
    id: "welcome-create-wallet-btn"

# If overlay intercepted first tap, we're still on welcome screen — retry
- runFlow:
    when:
      visible:
        id: "welcome-screen"
    commands:
      - tapOn:
          id: "welcome-create-wallet-btn"

# Wait for intro screen (wallet generation may take a few seconds)
- extendedWaitUntil:
    visible:
      id: "intro-screen"
    timeout: 30000

# Tap continue to proceed to seed display
- tapOn:
    id: "intro-continue-btn"

# Verify seed display screen is visible
- assertVisible:
    id: "seed-display-screen"

# Verify seed phrase area is present (seed words rendered)
- assertVisible:
    id: "seed-display-continue-btn"
