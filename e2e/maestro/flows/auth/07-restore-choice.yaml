appId: com.ducatprotocol.DucatProtocolWallet
---
# Restore Choice - Verify restore wallet shows seed phrase and passkey options
# clearState → welcome → restore → verify choice screen options

- launchApp:
    clearState: true
    clearKeychain: true
- runFlow: ../../helpers/dismiss-dev-client.yaml

# Welcome screen
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-restore-wallet-btn"

# Verify restore choice screen
- assertVisible:
    id: "restore-choice-screen"
- assertVisible:
    id: "restore-seed-phrase-btn"
