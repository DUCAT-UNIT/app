appId: com.ducatprotocol.DucatProtocolWallet
---
# Cashu Mint Screen - Navigate to mint flow with funded wallet and verify interactive UI
# Create wallet with vault (has UNIT) → Cashu receive deep link → mint → verify input and interaction

- runFlow: ../helpers/create-wallet-with-vault.yaml

# Open CashuReceiveScreen directly; Turbo Cashu settings are intentionally hidden.
- openLink: "ducat://cashu/receive"
- runFlow: ../helpers/accept-open-in-app-alert.yaml
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "cashu-receive-screen"
    timeout: 10000

# Choose Mint option
- tapOn:
    id: "cashu-receive-mint-btn"
- waitForAnimationToEnd

# Verify mint amount input screen UI elements
- extendedWaitUntil:
    visible:
      id: "cashu-mint-screen"
    timeout: 10000
- assertVisible:
    id: "cashu-mint-amount-input"
- assertVisible:
    id: "cashu-mint-btn"

# Verify the screen title text is present
- assertVisible:
    text: "Mint Turbo UNIT"

# Test amount input accepts numeric values
- tapOn:
    id: "cashu-mint-amount-input"
- inputText: "100"

# Verify mint button is interactive after entering amount
- assertVisible:
    id: "cashu-mint-btn"
