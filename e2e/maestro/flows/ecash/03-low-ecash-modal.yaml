appId: com.ducatprotocol.DucatProtocolWallet
---
# Low Ecash Modal - Verify low ecash modal behavior if it appears
# Import wallet → check for modal or wallet screen → if modal dismiss it

- runFlow: ../helpers/import-wallet-no-ecash-dismiss.yaml

# Wait for wallet screen to be visible (modals may overlap)
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 20000

# If low ecash modal is visible, verify and dismiss it
- runFlow:
    when:
      visible:
        id: "low-ecash-modal"
    commands:
      - tapOn:
          id: "low-ecash-dismiss-btn"
      - waitForAnimationToEnd

# Dismiss airdrop modal if it appears
- runFlow:
    when:
      visible:
        text: "Get Started"
    commands:
      - tapOn:
          text: "Get Started"
      - waitForAnimationToEnd

# Verify wallet screen is accessible
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000

# Verify wallet is functional by waiting for balance section
- extendedWaitUntil:
    visible:
      id: "balance-section"
    timeout: 15000
