appId: com.ducatprotocol.DucatProtocolWallet
---
# Cashu Mint Initiation - Navigate full mint path, enter amount, initiate mint, verify quote created
# Create wallet with vault (has UNIT Runes) → settings → cashu → mint → enter amount → tap mint → verify quote

- runFlow: ../helpers/create-wallet-with-vault.yaml

# Navigate to settings
- tapOn:
    id: "wallet-settings-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Enable dev mode (required for cashu settings)
- tapOn:
    id: "settings-advanced-btn"
- extendedWaitUntil:
    visible:
      id: "advanced-screen"
    timeout: 5000
- tapOn:
    id: "advanced-dev-mode-btn"
- tapOn:
    id: "advanced-back-btn"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000

# Open Cashu settings
- tapOn:
    id: "settings-cashu-btn"
- extendedWaitUntil:
    visible:
      id: "cashu-settings-screen"
    timeout: 5000

# Tap Redeem Token to open CashuReceiveScreen
- tapOn:
    id: "cashu-redeem-token-btn"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "cashu-receive-screen"
    timeout: 10000

# Choose Mint option
- tapOn:
    id: "cashu-receive-mint-btn"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "cashu-mint-screen"
    timeout: 10000

# Verify mint screen UI elements
- assertVisible:
    text: "Mint Turbo UNIT"
- assertVisible:
    text: "Amount (sats)"

# Enter mint amount (100 sats)
- tapOn:
    id: "cashu-mint-amount-input"
- inputText: "100"

# Tap mint button to initiate mint flow
- tapOn:
    id: "cashu-mint-btn"

# Mint quote should be created successfully - app shows "You will send" confirmation screen
- extendedWaitUntil:
    visible:
      text: "You will send"
    timeout: 30000

# Verify the deposit details show UNIT amount
- assertVisible:
    text: "100.00 UNIT"

# Tap Confirm and Sign to broadcast the UNIT deposit to the mint
- tapOn:
    text: "Confirm and Sign"

# Wait for transaction to be signed and broadcast (ProcessingScreen is transient)
# Then ConfirmationScreen shows "Transaction Sent!"
- extendedWaitUntil:
    visible:
      text: "Transaction Sent!"
    timeout: 60000

# Verify we're on the confirmation screen
- assertVisible:
    id: "confirmation-screen"

# Full mint flow verified:
# 1. Mint quote created successfully (no "Unsupported unit: unit" error)
# 2. UNIT Runes signed and broadcast to mint deposit address
# 3. Transaction confirmed on-chain (Transaction Sent!)
# Background CashuContext polling (every 5s) will complete the mint
# and issue Cashu tokens once the deposit confirms on Mutinynet (~30s).
