appId: com.ducatprotocol.DucatProtocolWallet
---
# Cashu UNIT Address - Verify UNIT receive screen shows QR and copy functionality
# Import wallet → deposit UNIT → verify address screen with copy

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Dismiss passkey migration modal if it appears
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Navigate to deposit UNIT
- tapOn:
    id: "wallet-deposit-btn"
- extendedWaitUntil:
    visible:
      id: "deposit-unit"
    timeout: 5000
- tapOn:
    id: "deposit-unit"

# Verify UNIT address screen loads (use text since testID may not be exposed)
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "UNIT address"
    timeout: 10000

# Verify we're on the UNIT address screen
- assertVisible:
    text: "UNIT address"

# Verify instruction text is visible
- assertVisible:
    text: "Only use this address to receive UNIT."
