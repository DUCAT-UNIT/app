appId: com.ducatprotocol.DucatProtocolWallet
---
- runFlow: ../helpers/unlock-if-locked.yaml

- runFlow:
    when:
      visible:
        id: "vault-create-success-screen"
    commands:
      - tapOn:
          id: "vault-success-done-btn"

- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 30000

- runFlow: ../helpers/dismiss-debug-warning.yaml

- extendedWaitUntil:
    visible:
      id: "wallet-repay-btn"
    timeout: 240000

- tapOn:
    id: "wallet-repay-btn"

- extendedWaitUntil:
    visible:
      id: "vault-repay-input-screen"
    timeout: 20000

- tapOn:
    id: "vault-repay-amount-display"

- extendedWaitUntil:
    visible:
      id: "vault-repay-amount-input"
    timeout: 5000

- tapOn:
    id: "vault-repay-amount-input"

- eraseText
- inputText: "90"
- pressKey: Enter

- runFlow:
    when:
      visible:
        id: "vault-repay-amount-input"
    commands:
      - tapOn:
          id: "vault-repay-amount-done-btn"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: "vault-repay-amount-input"
    commands:
      - hideKeyboard
      - waitForAnimationToEnd

- extendedWaitUntil:
    notVisible:
      id: "vault-repay-amount-input"
    timeout: 10000

- runFlow:
    when:
      visible:
        text: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,86%"
      - waitForAnimationToEnd

- tapOn:
    id: "vault-repay-continue-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-repay-input-screen"
    commands:
      - tapOn:
          id: "vault-repay-continue-btn"

- extendedWaitUntil:
    visible:
      id: "vault-repay-funding-continue-btn"
    timeout: 20000

- scrollUntilVisible:
    element:
      id: "vault-repay-funding-usdc-card"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "vault-repay-funding-usdc-card"

- tapOn:
    id: "vault-repay-funding-continue-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-repay-funding-continue-btn"
    commands:
      - tapOn:
          id: "vault-repay-funding-continue-btn"

- extendedWaitUntil:
    visible:
      id: "vault-repay-confirm-screen"
    timeout: 20000

- scrollUntilVisible:
    element:
      id: "vault-repay-confirm-btn"
    direction: DOWN
    timeout: 5000

- runFlow: ../helpers/dismiss-debug-warning.yaml

- tapOn:
    id: "vault-repay-confirm-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-repay-confirm-screen"
    commands:
      - tapOn:
          id: "vault-repay-confirm-btn"
- runFlow:
    when:
      visible:
        id: "pin-fallback-modal"
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

- extendedWaitUntil:
    visible:
      id: "vault-repay-success-screen"
    timeout: 420000
