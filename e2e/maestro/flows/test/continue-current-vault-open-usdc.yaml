appId: com.ducatprotocol.DucatProtocolWallet
---
- runFlow: ../helpers/unlock-if-locked.yaml

- extendedWaitUntil:
    visible:
      id: "vault-amounts-screen"
    timeout: 10000

- runFlow: ../helpers/dismiss-debug-warning.yaml

- extendedWaitUntil:
    notVisible:
      text: "Open debugger to view warnings."
    timeout: 5000

- tapOn:
    id: "vault-create-continue-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-amounts-screen"
    commands:
      - tapOn:
          id: "vault-create-continue-btn"

- extendedWaitUntil:
    visible:
      id: "vault-create-confirm-screen"
    timeout: 15000

- scrollUntilVisible:
    element:
      id: "vault-create-confirm-btn"
    direction: DOWN
    timeout: 5000

- runFlow: ../helpers/dismiss-debug-warning.yaml

- extendedWaitUntil:
    notVisible:
      text: "Open debugger to view warnings."
    timeout: 5000

- tapOn:
    id: "vault-create-confirm-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-create-confirm-screen"
    commands:
      - tapOn:
          id: "vault-create-confirm-btn"

- extendedWaitUntil:
    visible:
      id: "vault-create-success-screen"
    timeout: 420000

- assertVisible:
    text: "Vault Created!"
