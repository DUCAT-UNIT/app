appId: com.ducatprotocol.DucatProtocolWallet
---
# Fresh wallet -> open vault -> settle to USDC -> repay from USDC

- runFlow: ../helpers/create-wallet.yaml
- runFlow: ../helpers/enable-usdc.yaml

- extendedWaitUntil:
    visible:
      text: "0.10000000"
    timeout: 120000

- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "create-vault-btn"
    timeout: 10000

- tapOn:
    id: "create-vault-btn"

- extendedWaitUntil:
    visible:
      id: "vault-amounts-screen"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "btc-slider-max-btn"
    timeout: 120000

- waitForAnimationToEnd
- waitForAnimationToEnd

- tapOn:
    id: "btc-slider-max-btn"

- waitForAnimationToEnd
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "0.00000000"
    commands:
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - tapOn:
          id: "btc-slider-max-btn"
      - waitForAnimationToEnd
      - waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "unit-slider-max-btn"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "unit-slider-max-btn"

- waitForAnimationToEnd
- waitForAnimationToEnd

- tapOn:
    id: "vault-create-borrow-usd-display"

- extendedWaitUntil:
    visible:
      id: "vault-create-borrow-usd-input"
    timeout: 5000

- tapOn:
    id: "vault-create-borrow-usd-input"

- eraseText
- inputText: "100"
- pressKey: Enter

- runFlow:
    when:
      visible:
        id: "vault-create-borrow-usd-input"
    commands:
      - tapOn:
          id: "vault-create-borrow-usd-done-btn"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: "vault-create-borrow-usd-input"
    commands:
      - hideKeyboard
      - waitForAnimationToEnd

- extendedWaitUntil:
    notVisible:
      id: "vault-create-borrow-usd-input"
    timeout: 10000

- waitForAnimationToEnd
- waitForAnimationToEnd

- runFlow: ../helpers/dismiss-debug-warning.yaml

- extendedWaitUntil:
    notVisible:
      text: "Open debugger to view warnings."
    timeout: 5000

- tapOn:
    id: "vault-create-continue-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-amounts-screen"
    commands:
      - tapOn:
          id: "vault-create-continue-btn"

- extendedWaitUntil:
    visible:
      text: "How do you want to receive your loan?"
    timeout: 15000

- scrollUntilVisible:
    element:
      id: "vault-create-payout-usdc-card"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "vault-create-payout-usdc-card"
- tapOn:
    id: "vault-create-payout-continue-btn"

- extendedWaitUntil:
    visible:
      id: "vault-create-confirm-screen"
    timeout: 15000

- scrollUntilVisible:
    element:
      id: "vault-create-confirm-btn"
    direction: DOWN
    timeout: 5000

- runFlow: ../helpers/dismiss-debug-warning.yaml

- extendedWaitUntil:
    notVisible:
      text: "Open debugger to view warnings."
    timeout: 5000

- tapOn:
    id: "vault-create-confirm-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-create-confirm-screen"
    commands:
      - tapOn:
          id: "vault-create-confirm-btn"
- runFlow:
    when:
      visible:
        id: "pin-fallback-modal"
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

- extendedWaitUntil:
    visible:
      id: "vault-create-success-screen"
    timeout: 420000

- tapOn:
    id: "vault-success-done-btn"

- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 30000

- runFlow: ../helpers/dismiss-debug-warning.yaml

- extendedWaitUntil:
    visible:
      id: "wallet-vault-actions-ready"
    timeout: 240000

- extendedWaitUntil:
    visible:
      id: "wallet-repay-btn"
    timeout: 240000

- tapOn:
    id: "wallet-repay-btn"

- extendedWaitUntil:
    visible:
      id: "vault-repay-input-screen"
    timeout: 20000

- tapOn:
    id: "vault-repay-amount-display"

- extendedWaitUntil:
    visible:
      id: "vault-repay-amount-input"
    timeout: 5000

- tapOn:
    id: "vault-repay-amount-input"

- eraseText
- inputText: "90"
- pressKey: Enter

- runFlow:
    when:
      visible:
        id: "vault-repay-amount-input"
    commands:
      - tapOn:
          id: "vault-repay-amount-done-btn"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: "vault-repay-amount-input"
    commands:
      - hideKeyboard
      - waitForAnimationToEnd

- extendedWaitUntil:
    notVisible:
      id: "vault-repay-amount-input"
    timeout: 10000

- runFlow: ../helpers/dismiss-debug-warning.yaml

- extendedWaitUntil:
    notVisible:
      text: "Open debugger to view warnings."
    timeout: 5000

- tapOn:
    id: "vault-repay-continue-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-repay-input-screen"
    commands:
      - tapOn:
          id: "vault-repay-continue-btn"

- extendedWaitUntil:
    visible:
      id: "vault-repay-funding-continue-btn"
    timeout: 20000

- scrollUntilVisible:
    element:
      id: "vault-repay-funding-usdc-card"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "vault-repay-funding-usdc-card"

- tapOn:
    id: "vault-repay-funding-continue-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-repay-funding-continue-btn"
    commands:
      - tapOn:
          id: "vault-repay-funding-continue-btn"

- extendedWaitUntil:
    visible:
      id: "vault-repay-confirm-screen"
    timeout: 20000

- scrollUntilVisible:
    element:
      id: "vault-repay-confirm-btn"
    direction: DOWN
    timeout: 5000

- runFlow: ../helpers/dismiss-debug-warning.yaml

- extendedWaitUntil:
    notVisible:
      text: "Open debugger to view warnings."
    timeout: 5000

- tapOn:
    id: "vault-repay-confirm-btn"

- runFlow: ../helpers/dismiss-debug-warning.yaml

- runFlow:
    when:
      visible:
        id: "vault-repay-confirm-screen"
    commands:
      - tapOn:
          id: "vault-repay-confirm-btn"
- runFlow:
    when:
      visible:
        id: "pin-fallback-modal"
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

- extendedWaitUntil:
    visible:
      id: "vault-repay-success-screen"
    timeout: 420000
