appId: com.ducatprotocol.DucatProtocolWallet
---
# Fresh reviewer wallet -> real vault -> borrow TurboUNIT -> repay a tiny amount with TurboUNIT.
# This is a live regression flow. Run through scripts/runLiveRegression.mjs so the
# log watchdog fails if the app stays in preparing/building/submitting too long.

- runFlow: live-vault-borrow-turbounit.yaml
- tapOn:
    id: 'vault-success-done-btn'
- extendedWaitUntil:
    visible:
      id: 'wallet-screen'
    timeout: 10000

# Repay through the TurboUNIT funding card. Use an exact tiny amount so the
# TurboUNIT card is funded even when direct on-chain UNIT also exists.
- extendedWaitUntil:
    visible:
      id: 'wallet-repay-btn'
    timeout: 240000

- tapOn:
    id: 'wallet-repay-btn'

- extendedWaitUntil:
    visible:
      id: 'vault-repay-input-screen'
    timeout: 20000

- tapOn:
    id: 'vault-repay-amount-display'

- extendedWaitUntil:
    visible:
      id: 'vault-repay-amount-input'
    timeout: 5000

- eraseText
- inputText: '0.01'

- tapOn:
    id: 'vault-repay-amount-done-btn'
- waitForAnimationToEnd
- waitForAnimationToEnd

- tapOn:
    id: 'vault-repay-continue-btn'

- runFlow:
    when:
      visible:
        id: 'vault-repay-input-screen'
    commands:
      - tapOn:
          id: 'vault-repay-continue-btn'

- extendedWaitUntil:
    visible:
      id: 'vault-repay-funding-continue-btn'
    timeout: 20000

- scrollUntilVisible:
    element:
      id: 'vault-repay-funding-turbounit-card'
    direction: DOWN
    timeout: 5000
- tapOn:
    id: 'vault-repay-funding-turbounit-card'

- tapOn:
    id: 'vault-repay-funding-continue-btn'

- runFlow:
    when:
      visible:
        id: 'vault-repay-funding-continue-btn'
    commands:
      - tapOn:
          id: 'vault-repay-funding-continue-btn'

- extendedWaitUntil:
    visible:
      id: 'vault-repay-confirm-screen'
    timeout: 30000

- scrollUntilVisible:
    element:
      id: 'vault-repay-confirm-btn'
    direction: DOWN
    timeout: 5000

- tapOn:
    id: 'vault-repay-confirm-btn'

- runFlow:
    when:
      visible:
        id: 'vault-repay-confirm-screen'
    commands:
      - tapOn:
          id: 'vault-repay-confirm-btn'
- runFlow:
    when:
      visible:
        id: 'pin-fallback-modal'
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

- extendedWaitUntil:
    visible:
      id: 'vault-repay-success-screen'
    timeout: 420000
