appId: com.ducatprotocol.DucatProtocolWallet
---
# Live regression for the "first repay passes, second repay fails" class.
# Runs two on-chain UNIT repayments against the same real vault.

- runFlow: ../helpers/create-wallet-with-vault.yaml

- extendedWaitUntil:
    visible:
      id: 'wallet-repay-btn'
    timeout: 240000

# First repayment.
- tapOn:
    id: 'wallet-repay-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-input-screen'
    timeout: 20000
- tapOn:
    id: 'vault-repay-amount-display'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-amount-input'
    timeout: 5000
- eraseText
- inputText: '1'
- tapOn:
    id: 'vault-repay-amount-done-btn'
- waitForAnimationToEnd
- tapOn:
    id: 'vault-repay-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-funding-continue-btn'
    timeout: 20000
- runFlow:
    when:
      visible:
        id: 'vault-repay-funding-unit-card'
    commands:
      - tapOn:
          id: 'vault-repay-funding-unit-card'
- tapOn:
    id: 'vault-repay-funding-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-confirm-screen'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'vault-repay-confirm-btn'
    direction: DOWN
    timeout: 5000
- tapOn:
    id: 'vault-repay-confirm-btn'
- runFlow:
    when:
      visible:
        id: 'pin-fallback-modal'
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml
- extendedWaitUntil:
    visible:
      id: 'vault-repay-success-screen'
    timeout: 240000
- tapOn:
    id: 'vault-success-done-btn'

# Wait until the pending overlay clears before starting the second repayment.
- extendedWaitUntil:
    visible:
      id: 'wallet-screen'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'vault-card'
    direction: DOWN
    timeout: 10000
- extendedWaitUntil:
    notVisible:
      id: 'vault-overlay'
    timeout: 240000
- extendedWaitUntil:
    visible:
      id: 'wallet-vault-actions-ready'
    timeout: 240000

# Second repayment should follow the same real path and not get stuck in
# preparing request or building transaction.
- extendedWaitUntil:
    visible:
      id: 'wallet-repay-btn'
    timeout: 240000
- tapOn:
    id: 'wallet-repay-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-input-screen'
    timeout: 20000
- tapOn:
    id: 'vault-repay-amount-display'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-amount-input'
    timeout: 5000
- eraseText
- inputText: '1'
- tapOn:
    id: 'vault-repay-amount-done-btn'
- waitForAnimationToEnd
- tapOn:
    id: 'vault-repay-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-funding-continue-btn'
    timeout: 20000
- runFlow:
    when:
      visible:
        id: 'vault-repay-funding-unit-card'
    commands:
      - tapOn:
          id: 'vault-repay-funding-unit-card'
- tapOn:
    id: 'vault-repay-funding-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-confirm-screen'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'vault-repay-confirm-btn'
    direction: DOWN
    timeout: 5000
- tapOn:
    id: 'vault-repay-confirm-btn'
- runFlow:
    when:
      visible:
        id: 'pin-fallback-modal'
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml
- extendedWaitUntil:
    visible:
      id: 'vault-repay-success-screen'
    timeout: 240000
