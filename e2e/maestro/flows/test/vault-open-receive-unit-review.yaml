appId: com.ducatprotocol.DucatProtocolWallet
---
# Smoke check for the dedicated payout step on vault creation.
# Moves through the amounts screen and verifies the separate payout-choice screen renders.

- runFlow: ../helpers/create-wallet.yaml

- waitForAnimationToEnd
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "create-vault-btn"
    timeout: 10000
- tapOn:
    id: "create-vault-btn"

- extendedWaitUntil:
    visible:
      id: "vault-amounts-screen"
    timeout: 10000

- runFlow: ../helpers/dismiss-debug-warning.yaml

- tapOn:
    id: "btc-slider-max-btn"

- waitForAnimationToEnd

- tapOn:
    id: "unit-slider-max-btn"

- waitForAnimationToEnd

- tapOn:
    id: "vault-create-borrow-usd-display"

- extendedWaitUntil:
    visible:
      id: "vault-create-borrow-usd-input"
    timeout: 5000

- tapOn:
    id: "vault-create-borrow-usd-input"

- eraseText
- inputText: "4848"
- pressKey: Enter

- waitForAnimationToEnd
- runFlow: ../helpers/dismiss-debug-warning.yaml

- tapOn:
    id: "vault-create-continue-btn"

- extendedWaitUntil:
    visible:
      text: "Where should we send your borrowed value?"
    timeout: 10000

- assertVisible:
    id: "vault-create-payout-turbounit-card"

- runFlow:
    when:
      visible:
        id: "vault-create-payout-usdc-card"
    commands:
      - assertVisible:
          id: "vault-create-payout-usdc-card"

- assertVisible:
    id: "vault-create-payout-unit-card"

- tapOn:
    id: "vault-create-payout-unit-card"

- tapOn:
    id: "vault-create-payout-continue-btn"

- extendedWaitUntil:
    visible:
      id: "vault-create-confirm-screen"
    timeout: 10000
