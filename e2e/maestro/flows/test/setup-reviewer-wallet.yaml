appId: com.ducatprotocol.DucatProtocolWallet
---
# Setup Apple Reviewer Wallet
# Imports a pre-funded wallet and creates a real vault via Guardian
# Run through scripts/runMaestroLive.mjs against the normal app bundle so vault
# creation goes through real Guardian protocol.

- runFlow: ../helpers/clear-and-launch.yaml

# Tap restore button — first tap may dismiss Expo Dev Client overlay
- tapOn:
    id: "welcome-restore-wallet-btn"

# If overlay intercepted first tap, we're still on welcome screen — retry
- runFlow:
    when:
      visible:
        id: "welcome-screen"
    commands:
      - tapOn:
          id: "welcome-restore-wallet-btn"

# Restore choice screen
- extendedWaitUntil:
    visible:
      id: "restore-choice-screen"
    timeout: 5000
- tapOn:
    id: "restore-seed-phrase-btn"

# Import wallet screen
- assertVisible:
    id: "import-wallet-screen"

# Type seed phrase: pool token pledge wagon rebuild vast bracket denial fashion cattle pave royal
- tapOn:
    id: "seed-word-container-0"
- inputText: "pool"
- pressKey: Enter
- inputText: "token"
- pressKey: Enter
- inputText: "pledge"
- pressKey: Enter
- inputText: "wagon"
- pressKey: Enter
- inputText: "rebuild"
- pressKey: Enter
- inputText: "vast"
- pressKey: Enter
- inputText: "bracket"
- pressKey: Enter
- inputText: "denial"
- pressKey: Enter
- inputText: "fashion"
- pressKey: Enter
- inputText: "cattle"
- pressKey: Enter
- inputText: "pave"
- pressKey: Enter
- inputText: "royal"

# Verify all 12 words populated
- extendedWaitUntil:
    visible:
      text: "12/12"
    timeout: 5000
- pressKey: Enter
- waitForAnimationToEnd

# Tap import button
- runFlow: ../helpers/submit-import-wallet-if-visible.yaml

# PIN setup (111111)
- extendedWaitUntil:
    visible:
      id: "pin-setup-title"
    timeout: 30000
- runFlow: ../helpers/enter-pin-setup.yaml
- extendedWaitUntil:
    visible:
      text: "Confirm Your PIN"
    timeout: 10000
- runFlow: ../helpers/enter-pin-setup.yaml
- runFlow: ../helpers/retry-pin-setup-if-mismatch.yaml

# In __DEV__ mode, passkey migration modal is skipped automatically
# Biometric prompt may still appear
- runFlow:
    when:
      visible:
        id: "biometric-modal"
    commands:
      - tapOn:
          id: "biometric-skip-btn"

# Lock screen may appear for PIN re-verification after setup (conditional)
- runFlow:
    when:
      visible:
        id: "lock-title"
    commands:
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - runFlow: ../helpers/enter-pin-lock.yaml
# If PIN was rejected (tapped too fast), wait and retry
- runFlow:
    when:
      visible:
        id: "lock-title"
    commands:
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - runFlow: ../helpers/enter-pin-lock.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"
      - waitForAnimationToEnd

# Verify wallet screen loads with funded balance
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "balance-section"
    timeout: 30000

# Wait for BTC balance to load — vault amounts screen has its own wait
# Just give wallet some time to start fetching UTXOs
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# --- Reviewer live fixture readiness ---

# The TestFlight reviewer wallet is the funded live fixture and already has an
# active vault plus spendable UNIT. Keep this setup deterministic by verifying
# that state instead of opening a fresh vault on every strict run.
- scrollUntilVisible:
    element:
      id: "vault-card"
    direction: DOWN
    timeout: 10000

- extendedWaitUntil:
    notVisible:
      id: "vault-overlay"
    timeout: 180000
- extendedWaitUntil:
    visible:
      id: "wallet-vault-actions-ready"
    timeout: 180000

# Wait for UNIT balance to appear
- swipe:
    start: "50%, 30%"
    end: "50%, 80%"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "asset-card-unit"
    direction: DOWN
    timeout: 10000
# UNIT balance may have comma separators (e.g., "4,625.00")
- extendedWaitUntil:
    visible:
      text: "^[1-9][\\d,]*\\.\\d{2}$"
    timeout: 180000

# Scroll back to top
- swipe:
    start: "50%, 30%"
    end: "50%, 80%"
- waitForAnimationToEnd
- waitForAnimationToEnd
