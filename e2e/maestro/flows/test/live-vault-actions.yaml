appId: com.ducatprotocol.DucatProtocolWallet
---
# Live vault action coverage.
# Fresh wallet -> real vault open -> real collateral deposit -> real UNIT borrow ->
# real UNIT repay -> real BTC withdraw. The live runner verifies emitted txids on
# Mutinynet and, with --require-confirmation, waits for block confirmation.

- runFlow: ../helpers/create-wallet-with-vault.yaml

# Wait until the opening vault transaction has cleared from app pending state.
- extendedWaitUntil:
    visible:
      id: 'wallet-vault-actions-ready'
    timeout: 240000

# Additional BTC collateral deposit into the existing vault.
- extendedWaitUntil:
    visible:
      id: 'wallet-deposit-btn'
    timeout: 30000
- tapOn:
    id: 'wallet-deposit-btn'
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'vault-deposit-input-screen'
    timeout: 10000
- tapOn:
    id: 'vault-deposit-amount-display'
- extendedWaitUntil:
    visible:
      id: 'vault-deposit-amount-input'
    timeout: 5000
- eraseText
- inputText: '0.00001000'
- tapOn:
    id: 'vault-deposit-amount-done-btn'
- waitForAnimationToEnd

- tapOn:
    id: 'vault-deposit-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-deposit-confirm-screen'
    timeout: 15000
- tapOn:
    id: 'vault-deposit-confirm-btn'
- runFlow:
    when:
      visible:
        id: 'pin-fallback-modal'
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

- extendedWaitUntil:
    visible:
      id: 'vault-deposit-success-screen'
    timeout: 240000
- tapOn:
    id: 'vault-success-done-btn'

- runFlow: ../helpers/unlock-if-locked.yaml
- extendedWaitUntil:
    visible:
      id: 'wallet-screen'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'vault-card'
    direction: DOWN
    timeout: 10000
- extendedWaitUntil:
    notVisible:
      id: 'vault-overlay'
    timeout: 240000
- swipe:
    start: '50%, 30%'
    end: '50%, 80%'
- waitForAnimationToEnd

# Additional on-chain UNIT borrow from the existing vault.
- runFlow: ../helpers/unlock-if-locked.yaml
- extendedWaitUntil:
    visible:
      id: 'wallet-borrow-btn'
    timeout: 240000
- tapOn:
    id: 'wallet-borrow-btn'

- extendedWaitUntil:
    visible:
      id: 'vault-borrow-input-screen'
    timeout: 10000
- tapOn:
    id: 'vault-borrow-amount-display'
- extendedWaitUntil:
    visible:
      id: 'vault-borrow-amount-input'
    timeout: 5000
- eraseText
- inputText: '1'
- tapOn:
    id: 'vault-borrow-amount-done-btn'
- waitForAnimationToEnd

- tapOn:
    id: 'vault-borrow-continue-btn'
- scrollUntilVisible:
    element:
      id: 'vault-borrow-payout-unit-card'
    direction: DOWN
    timeout: 10000
- tapOn:
    id: 'vault-borrow-payout-unit-card'
- tapOn:
    id: 'vault-borrow-payout-continue-btn'

- extendedWaitUntil:
    visible:
      id: 'vault-borrow-confirm-screen'
    timeout: 15000
- tapOn:
    id: 'vault-borrow-confirm-btn'
- runFlow:
    when:
      visible:
        id: 'pin-fallback-modal'
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

- extendedWaitUntil:
    visible:
      id: 'vault-borrow-success-screen'
    timeout: 240000
- tapOn:
    id: 'vault-success-done-btn'

- runFlow: ../helpers/unlock-if-locked.yaml
- extendedWaitUntil:
    visible:
      id: 'wallet-screen'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'vault-card'
    direction: DOWN
    timeout: 10000
- extendedWaitUntil:
    notVisible:
      id: 'vault-overlay'
    timeout: 240000
- swipe:
    start: '50%, 30%'
    end: '50%, 80%'
- waitForAnimationToEnd

# On-chain UNIT repay from spendable UNIT, explicitly not USDC/TurboUNIT.
- runFlow: ../helpers/unlock-if-locked.yaml
- extendedWaitUntil:
    visible:
      id: 'wallet-repay-btn'
    timeout: 240000
- tapOn:
    id: 'wallet-repay-btn'

- extendedWaitUntil:
    visible:
      id: 'vault-repay-input-screen'
    timeout: 10000
- tapOn:
    id: 'vault-repay-amount-display'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-amount-input'
    timeout: 5000
- eraseText
- inputText: '1'
- tapOn:
    id: 'vault-repay-amount-done-btn'
- waitForAnimationToEnd

- tapOn:
    id: 'vault-repay-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-funding-continue-btn'
    timeout: 15000
- runFlow:
    when:
      visible:
        id: 'vault-repay-funding-unit-card'
    commands:
      - tapOn:
          id: 'vault-repay-funding-unit-card'
- tapOn:
    id: 'vault-repay-funding-continue-btn'

- extendedWaitUntil:
    visible:
      id: 'vault-repay-confirm-screen'
    timeout: 15000
- tapOn:
    id: 'vault-repay-confirm-btn'
- runFlow:
    when:
      visible:
        id: 'pin-fallback-modal'
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

- extendedWaitUntil:
    visible:
      id: 'vault-repay-success-screen'
    timeout: 240000
- tapOn:
    id: 'vault-success-done-btn'

- runFlow: ../helpers/unlock-if-locked.yaml
- extendedWaitUntil:
    visible:
      id: 'wallet-screen'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'vault-card'
    direction: DOWN
    timeout: 10000
- extendedWaitUntil:
    notVisible:
      id: 'vault-overlay'
    timeout: 240000
- swipe:
    start: '50%, 30%'
    end: '50%, 80%'
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'wallet-vault-actions-ready'
    timeout: 240000

# BTC collateral withdrawal.
- runFlow: ../helpers/unlock-if-locked.yaml
- extendedWaitUntil:
    visible:
      id: 'wallet-withdraw-btn'
    timeout: 30000
- tapOn:
    id: 'wallet-withdraw-btn'
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'vault-withdraw-input-screen'
    timeout: 10000
- tapOn:
    id: 'vault-withdraw-amount-display'
- extendedWaitUntil:
    visible:
      id: 'vault-withdraw-amount-input'
    timeout: 5000
- eraseText
- inputText: '0.00001000'
- tapOn:
    id: 'vault-withdraw-amount-done-btn'
- waitForAnimationToEnd

- tapOn:
    id: 'vault-withdraw-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-withdraw-confirm-screen'
    timeout: 15000
- tapOn:
    id: 'vault-withdraw-confirm-btn'
- runFlow:
    when:
      visible:
        id: 'pin-fallback-modal'
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml

- extendedWaitUntil:
    visible:
      id: 'vault-withdraw-success-screen'
    timeout: 240000
