appId: com.ducatprotocol.DucatProtocolWallet
---
# Live BTC send path.
# Fresh wallet -> faucet-funded BTC -> real signed BTC transaction -> broadcast.
# The live runner verifies the emitted txid through Mutinynet Esplora.

- runFlow: ../helpers/create-wallet.yaml

- extendedWaitUntil:
    visible:
      id: 'wallet-actions'
    timeout: 30000

- tapOn:
    id: 'wallet-withdraw-btn'
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: 'withdraw-btc'
    timeout: 10000
- tapOn:
    id: 'withdraw-btc'

- extendedWaitUntil:
    visible:
      id: 'send-input-screen'
    timeout: 10000

- tapOn:
    id: 'send-address-input'
- inputText: 'tb1qw508d6qejxtdg4y5r3zarvary0c5xw7kxpjzsx'
- runFlow: ../helpers/dismiss-keyboard-prompt.yaml

- extendedWaitUntil:
    visible:
      text: 'Valid'
    timeout: 10000

- tapOn:
    id: 'btc-slider-max-btn'
- waitForAnimationToEnd

- runFlow: ../helpers/dismiss-debug-warning.yaml
- tapOn:
    id: 'send-review-btn'

- extendedWaitUntil:
    visible:
      id: 'review-screen'
    timeout: 120000
- assertVisible:
    text: 'You will send'

- tapOn:
    id: 'review-confirm-btn'

- extendedWaitUntil:
    visible:
      id: 'confirmation-screen'
    timeout: 180000
- assertVisible:
    text: 'Transaction Sent!'
- runFlow: ../helpers/dismiss-debug-warning.yaml
- tapOn:
    id: 'confirmation-copy-txid-btn'
