appId: com.ducatprotocol.DucatProtocolWallet
---
# Live vault interruption recovery.
# Submit a real vault repay, kill the app while the success screen is still open,
# then verify the pending vault lock rehydrates and eventually clears.

- runFlow: ../helpers/create-wallet-with-vault.yaml

- extendedWaitUntil:
    visible:
      id: 'wallet-repay-btn'
    timeout: 240000

- tapOn:
    id: 'wallet-repay-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-input-screen'
    timeout: 20000
- tapOn:
    id: 'vault-repay-amount-display'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-amount-input'
    timeout: 5000
- eraseText
- inputText: '1'
- tapOn:
    id: 'vault-repay-amount-done-btn'
- waitForAnimationToEnd
- tapOn:
    id: 'vault-repay-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-funding-continue-btn'
    timeout: 20000
- runFlow:
    when:
      visible:
        id: 'vault-repay-funding-unit-card'
    commands:
      - tapOn:
          id: 'vault-repay-funding-unit-card'
- tapOn:
    id: 'vault-repay-funding-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'vault-repay-confirm-screen'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'vault-repay-confirm-btn'
    direction: DOWN
    timeout: 5000
- tapOn:
    id: 'vault-repay-confirm-btn'
- runFlow:
    when:
      visible:
        id: 'pin-fallback-modal'
    commands:
      - runFlow: ../helpers/enter-pin-fallback.yaml
- extendedWaitUntil:
    visible:
      id: 'vault-repay-success-screen'
    timeout: 240000

- runFlow: ../helpers/relaunch-and-unlock.yaml

- runFlow: ../helpers/assert-vault-pending-recovered.yaml
