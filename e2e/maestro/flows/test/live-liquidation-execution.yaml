appId: com.ducatprotocol.DucatProtocolWallet
---
# Live liquidation execution.
# Requires at least one claimable vault from the live liquidation validator.

- runFlow: setup-reviewer-wallet.yaml

- openLink: 'ducat://liquidations'
- runFlow: ../helpers/accept-open-in-app-alert.yaml
- runFlow: ../helpers/unlock-if-locked.yaml

- extendedWaitUntil:
    visible:
      id: 'liquidations-tab-screen'
    timeout: 30000

- extendedWaitUntil:
    visible:
      id: 'liquidation-invest-amount-display'
    timeout: 120000
- tapOn:
    id: 'liquidation-invest-amount-display'
- extendedWaitUntil:
    visible:
      id: 'liquidation-invest-amount-input'
    timeout: 5000
- eraseText
- inputText: '${DUCAT_LIVE_LIQUIDATION_INVEST_BTC}'
- tapOn:
    id: 'liquidation-invest-amount-done-btn'
- waitForAnimationToEnd

- tapOn:
    id: 'liquidation-continue-btn'
- extendedWaitUntil:
    visible:
      id: 'liquidation-review-screen'
    timeout: 30000
- tapOn:
    id: 'liquidation-continue-btn'

- extendedWaitUntil:
    visible:
      id: 'liquidation-success-screen'
    timeout: 420000
- assertVisible:
    text: 'Liquidation Claimed!'
- tapOn:
    id: 'liquidation-copy-txid-btn'
- runFlow:
    when:
      visible:
        id: 'liquidation-copy-swap-txid-btn'
    commands:
      - tapOn:
          id: 'liquidation-copy-swap-txid-btn'
