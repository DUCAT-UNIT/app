appId: com.ducatprotocol.DucatProtocolWallet
---
# Sepolia asset actions - verify the wallet exposes Sepolia USDC through the asset card, not a broad liquidity shortcut card.

- runFlow: ../helpers/create-wallet.yaml
- runFlow: ../helpers/enable-usdc.yaml
- openLink: "ducat://wallet"
- runFlow: ../helpers/accept-open-in-app-alert.yaml
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "asset-card-usdc"
    direction: DOWN
    timeout: 15000
    centerElement: true
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd

- tapOn:
    text: "Sepolia USDC"
- extendedWaitUntil:
    visible:
      id: "asset-detail-screen"
    timeout: 10000

- assertVisible:
    text: "Sepolia USDC"
- assertVisible:
    id: "asset-detail-receive-btn"
- assertVisible:
    id: "asset-detail-swap-btn"

- runFlow: ../helpers/tap-asset-detail-receive.yaml
- extendedWaitUntil:
    visible:
      id: "receive-qr-screen"
    timeout: 10000
- assertVisible:
    text: "Sepolia USDC address"
- assertVisible:
    text: "Only use this address to receive Sepolia USDC on Ethereum Sepolia."
- tapOn:
    id: "receive-back-btn"

- extendedWaitUntil:
    visible:
      id: "asset-detail-screen"
    timeout: 10000
- tapOn:
    id: "asset-detail-swap-btn"
- extendedWaitUntil:
    visible:
      id: "sepolia-swap-screen"
    timeout: 10000
- assertVisible:
    id: "cross-chain-swap-amount-input"
- assertVisible:
    id: "cross-chain-swap-submit-btn"
- tapOn:
    id: "sepolia-swap-back-btn"

- extendedWaitUntil:
    visible:
      id: "asset-detail-screen"
    timeout: 10000
