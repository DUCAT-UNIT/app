appId: com.ducatprotocol.DucatProtocolWallet
---
# BTC Detail - Tap BTC asset card and verify detail screen
# Import wallet → tap BTC card → verify Bitcoin detail

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Tap on BTC asset card
- tapOn:
    id: "asset-card-btc"

# Verify navigation to asset detail
- extendedWaitUntil:
    visible:
      text: "Bitcoin"
    timeout: 5000
