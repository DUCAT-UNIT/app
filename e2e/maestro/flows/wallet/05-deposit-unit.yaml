appId: com.ducatprotocol.DucatProtocolWallet
---
# Deposit UNIT - Verify deposit sheet shows UNIT option
# Import wallet → tap deposit → verify UNIT option visible

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Tap deposit button - opens deposit sheet
- tapOn:
    id: "wallet-deposit-btn"

# Verify deposit sheet shows UNIT option
- extendedWaitUntil:
    visible:
      id: "deposit-unit"
    timeout: 5000
