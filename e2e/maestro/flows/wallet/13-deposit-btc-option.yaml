appId: com.ducatprotocol.DucatProtocolWallet
---
# Deposit BTC Option - Test the deposit BTC option opens receive screen
# Import wallet → deposit → BTC → verify receive screen

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml

- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Tap deposit button
- tapOn:
    id: "wallet-deposit-btn"

# Verify deposit sheet shows BTC option
- extendedWaitUntil:
    visible:
      id: "deposit-btc"
    timeout: 5000

# Vault option may or may not exist depending on wallet state
# Just verify we can see deposit-btc before tapping
- tapOn:
    id: "deposit-btc"

# Verify receive screen loads (use text since testID may not be exposed)
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Bitcoin address"
    timeout: 10000

# Verify the subtitle text
- assertVisible:
    text: "Only use this address to receive Bitcoin."
