appId: com.ducatprotocol.DucatProtocolWallet
---
# UNIT Asset Detail - Verify tapping UNIT card opens asset detail screen
# Funded wallet → tap UNIT card → verify detail screen loads

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Dismiss passkey migration modal if it appears
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Wait for asset cards to load
- extendedWaitUntil:
    visible:
      id: "asset-card-unit"
    timeout: 15000

# Tap UNIT asset card
- tapOn:
    id: "asset-card-unit"

# Verify asset detail screen loads with UNIT content
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "UNIT"
    timeout: 10000
