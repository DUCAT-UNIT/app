appId: com.ducatprotocol.DucatProtocolWallet
---
# Liquidation Dashboard - Verify the wallet liquidation surface opens and can return to wallet.

- runFlow: ../helpers/create-wallet.yaml

- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000

- openLink: "ducat://liquidations"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "liquidations-tab-screen"
    timeout: 10000
- assertVisible:
    text: "Liquidations are not available."

- tapOn:
    id: "liquidation-empty-back-btn"
- waitForAnimationToEnd

- assertVisible:
    id: "wallet-screen"
