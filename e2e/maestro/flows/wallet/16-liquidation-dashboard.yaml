appId: com.ducatprotocol.DucatProtocolWallet
---
# Liquidation Dashboard - Verify this release shows liquidations as unavailable.

- runFlow: ../helpers/create-wallet-no-funding.yaml

- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000

- openLink: "ducat://liquidations"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "liquidations-tab-screen"
    timeout: 10000
- assertVisible:
    text: "Liquidations are not available."

- tapOn:
    id: "liquidation-empty-back-btn"
- waitForAnimationToEnd

- assertVisible:
    id: "wallet-screen"
