appId: com.ducatprotocol.DucatProtocolWallet
---
# Sepolia USDC Receive Labeling - verify receive copy consistently says Sepolia USDC.

- runFlow: ../helpers/create-wallet.yaml
- runFlow: ../helpers/enable-usdc.yaml
- openLink: "ducat://wallet"
- runFlow: ../helpers/accept-open-in-app-alert.yaml
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 10000

- scrollUntilVisible:
    element:
      id: "asset-card-usdc"
    direction: DOWN
    timeout: 15000
    centerElement: true
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd

- tapOn:
    text: "Sepolia USDC"
- extendedWaitUntil:
    visible:
      id: "asset-detail-screen"
    timeout: 10000

- runFlow: ../helpers/tap-asset-detail-receive.yaml
- extendedWaitUntil:
    visible:
      id: "receive-qr-screen"
    timeout: 10000

- assertVisible:
    text: "Sepolia USDC address"
- assertVisible:
    text: "Only use this address to receive Sepolia USDC on Ethereum Sepolia."

- tapOn:
    text: ".*Tap to copy.*"
- assertVisible:
    text: "Sepolia USDC address copied"
