appId: com.ducatprotocol.DucatProtocolWallet
---
# Repay Button - Test that wallet buttons are accessible
# Import wallet → verify wallet screen is functional

- runFlow: ../helpers/import-wallet-typed.yaml

# Verify wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Wait for balance to load
- extendedWaitUntil:
    visible:
      id: "balance-section"
    timeout: 30000

# Dismiss low ecash modal if it appears
- runFlow: ../helpers/dismiss-low-ecash.yaml

# Wait for wallet actions
- extendedWaitUntil:
    visible:
      id: "wallet-actions"
    timeout: 15000

# Dismiss airdrop modal if it appears
- runFlow: ../helpers/dismiss-airdrop.yaml

# Dismiss passkey migration modal if it appears
- runFlow:
    when:
      visible:
        id: "passkey-migration-modal"
    commands:
      - tapOn:
          id: "passkey-skip-btn"

# Verify wallet screen is loaded and functional
- assertVisible:
    id: "wallet-screen"

# Verify deposit and withdraw buttons are visible (always present)
- assertVisible:
    id: "wallet-deposit-btn"
- assertVisible:
    id: "wallet-withdraw-btn"
