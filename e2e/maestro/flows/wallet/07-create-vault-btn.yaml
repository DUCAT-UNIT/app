appId: com.ducatprotocol.DucatProtocolWallet
---
# Create Vault Button - Verify create vault button is tappable
# Import wallet → verify vault overlay → tap create vault → verify navigation

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Verify vault overlay with create button
- assertVisible:
    id: "vault-overlay"
- assertVisible:
    id: "create-vault-btn"
