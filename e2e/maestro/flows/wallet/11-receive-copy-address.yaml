appId: com.ducatprotocol.DucatProtocolWallet
---
# Receive BTC Address - Verify deposit flow opens receive screen with full BTC address UI
# Import wallet → deposit → BTC → verify receive screen content including Share button

- runFlow: ../helpers/import-wallet-typed.yaml

# Wait for wallet screen
- extendedWaitUntil:
    visible:
      id: "wallet-screen"
    timeout: 15000

# Dismiss modals
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow: ../helpers/dismiss-passkey-recovery.yaml

# Navigate to receive via Receive button
- tapOn:
    id: "wallet-receive-btn"

# Deposit sheet opens - select BTC
- extendedWaitUntil:
    visible:
      id: "deposit-btc"
    timeout: 5000
- tapOn:
    id: "deposit-btc"

# Wait for receive screen
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Only use this address to receive Bitcoin."
    timeout: 10000

# Verify Bitcoin address title
- assertVisible:
    text: "Bitcoin address"


# Verify receive actions are present
- assertVisible:
    text: ".*Tap to copy.*"
