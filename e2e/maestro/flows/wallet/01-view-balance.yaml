appId: com.ducatprotocol.DucatProtocolWallet
---
# View Balance - Verify wallet screen shows all key elements
# Import wallet → verify balance section, asset cards, action buttons

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen elements
- assertVisible:
    id: "wallet-screen"
- assertVisible:
    id: "balance-section"
- assertVisible:
    id: "wallet-actions"
- assertVisible:
    id: "asset-card-btc"
- assertVisible:
    id: "asset-card-unit"

# Verify action buttons exist
- assertVisible:
    id: "wallet-repay-btn"
- assertVisible:
    id: "wallet-borrow-btn"
- assertVisible:
    id: "wallet-withdraw-btn"
- assertVisible:
    id: "wallet-deposit-btn"

# Verify header buttons exist
- assertVisible:
    id: "wallet-settings-btn"
- assertVisible:
    id: "wallet-history-btn"
