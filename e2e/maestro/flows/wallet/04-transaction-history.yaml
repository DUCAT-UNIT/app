appId: com.ducatprotocol.DucatProtocolWallet
---
# Transaction History - Verify funded wallet shows transaction history with transactions
# Create fresh wallet (airdrop) → tap history → verify history loads with transactions (not empty)

- runFlow: ../helpers/create-wallet.yaml

# Dismiss modals
- runFlow: ../helpers/dismiss-low-ecash.yaml
- runFlow: ../helpers/dismiss-airdrop.yaml
- runFlow: ../helpers/dismiss-passkey-recovery.yaml

# Tap history button
- tapOn:
    id: "wallet-history-btn"

# Verify transaction history screen loads
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Transaction History"
    timeout: 15000

# Verify the list is not empty. Live explorer/indexer reads can lag or briefly
# fail, so wait for the concrete first-row testID instead of sampling the empty
# state once.
- extendedWaitUntil:
    visible:
      id: "transaction-history-row-0"
    timeout: 180000
