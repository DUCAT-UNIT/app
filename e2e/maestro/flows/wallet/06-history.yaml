appId: com.ducatprotocol.DucatProtocolWallet
---
# Transaction History - Tap history button and verify history sheet opens
# Import wallet → tap history → verify history sheet title visible

- runFlow: ../../helpers/import-wallet.yaml

# Verify wallet screen
- assertVisible:
    id: "wallet-screen"

# Tap history button in header
- tapOn:
    id: "wallet-history-btn"

# Verify transaction history sheet opens
- extendedWaitUntil:
    visible:
      text: "Transaction History"
    timeout: 5000
