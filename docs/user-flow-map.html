<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ducat Wallet User Flow Map</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #151b23;
      --panel-2: #1b2330;
      --panel-3: #202938;
      --text: #eef3f8;
      --muted: #97a6b7;
      --soft: #c5ced8;
      --border: #2d3848;
      --accent: #f7931a;
      --accent-2: #2dd4bf;
      --accent-3: #6ea8fe;
      --danger: #ef6a6a;
      --success: #79d28a;
      --shadow: rgba(0, 0, 0, 0.32);
      --radius: 8px;
      --space: 16px;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(18, 27, 39, 0.94), rgba(13, 17, 23, 1) 42%),
        var(--bg);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 20px;
      align-items: end;
      padding: 24px clamp(18px, 4vw, 40px) 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(13, 17, 23, 0.82);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 8px;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 860px;
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .metric {
      min-width: 92px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius);
      padding: 10px 12px;
      box-shadow: 0 16px 28px var(--shadow);
    }

    .metric strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(420px, 1fr) minmax(300px, 380px);
      gap: 18px;
      padding: 18px clamp(18px, 3vw, 32px) 28px;
      min-height: 0;
    }

    .panel {
      border: 1px solid var(--border);
      background: rgba(21, 27, 35, 0.94);
      border-radius: var(--radius);
      box-shadow: 0 18px 40px var(--shadow);
      min-width: 0;
    }

    .sidebar,
    .inspector {
      position: sticky;
      top: 116px;
      height: calc(100vh - 142px);
      overflow: auto;
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2 {
      margin-bottom: 6px;
      font-size: 18px;
    }

    .panel-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .controls {
      display: grid;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--soft);
      font-size: 12px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #0f151d;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent-3);
      box-shadow: 0 0 0 3px rgba(110, 168, 254, 0.16);
    }

    .flow-list {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .flow-button {
      display: grid;
      gap: 7px;
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: var(--radius);
      padding: 12px;
      cursor: pointer;
      transition: border-color 140ms ease, transform 140ms ease, background 140ms ease;
    }

    .flow-button:hover,
    .flow-button:focus-visible {
      border-color: var(--accent-3);
      transform: translateY(-1px);
    }

    .flow-button.active {
      border-color: var(--accent);
      background: rgba(247, 147, 26, 0.12);
    }

    .flow-button strong {
      font-size: 14px;
      line-height: 1.25;
    }

    .flow-button span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .flow-meta {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--soft);
      background: rgba(255, 255, 255, 0.04);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .chip.accent {
      color: #ffe0b3;
      border-color: rgba(247, 147, 26, 0.45);
      background: rgba(247, 147, 26, 0.12);
    }

    .map-shell {
      min-width: 0;
      overflow: hidden;
    }

    .map-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(27, 35, 48, 0.72);
    }

    .map-toolbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.28);
    }

    .dot.active {
      background: var(--accent);
    }

    .dot.current {
      background: var(--accent-2);
    }

    .dot.neutral {
      background: var(--panel-3);
    }

    .map-scroll {
      overflow: auto;
      max-height: calc(100vh - 190px);
    }

    .map-stage {
      position: relative;
      min-width: 760px;
      padding: 18px;
    }

    .path-layer {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
      z-index: 0;
    }

    .group-section {
      position: relative;
      z-index: 1;
      margin-bottom: 20px;
      padding-bottom: 4px;
    }

    .group-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    .group-title h3 {
      margin: 0;
      font-size: 15px;
      color: var(--text);
    }

    .group-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .screen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .screen-card {
      position: relative;
      min-height: 154px;
      border: 1px solid var(--border);
      background: rgba(27, 35, 48, 0.92);
      border-radius: var(--radius);
      padding: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 140ms ease, transform 140ms ease, background 140ms ease;
    }

    .screen-card:hover,
    .screen-card:focus-visible {
      border-color: var(--accent-3);
      transform: translateY(-1px);
    }

    .screen-card.in-flow {
      border-color: rgba(247, 147, 26, 0.68);
      background:
        linear-gradient(180deg, rgba(247, 147, 26, 0.13), rgba(27, 35, 48, 0.96)),
        var(--panel-2);
    }

    .screen-card.current {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.16), 0 18px 32px var(--shadow);
    }

    .screen-type {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .screen-card h4 {
      margin: 8px 0 8px;
      font-size: 15px;
      line-height: 1.18;
    }

    .screen-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .step-badge {
      display: inline-grid;
      place-items: center;
      min-width: 24px;
      height: 24px;
      border-radius: 999px;
      padding: 0 6px;
      background: var(--accent);
      color: #1b1205;
      font-size: 11px;
      font-weight: 900;
    }

    .empty-state {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 18px;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
    }

    .inspector-content {
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .section {
      display: grid;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(15, 21, 29, 0.58);
    }

    .section h3 {
      margin: 0;
      font-size: 14px;
    }

    .section p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .timeline {
      display: grid;
      gap: 8px;
    }

    .step-button {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 10px;
      align-items: start;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 10px;
      text-align: left;
      cursor: pointer;
    }

    .step-button:hover,
    .step-button:focus-visible {
      border-color: var(--accent-3);
    }

    .step-button.active {
      border-color: var(--accent-2);
      background: rgba(45, 212, 191, 0.12);
    }

    .step-number {
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: var(--panel-3);
      color: var(--soft);
      font-weight: 900;
      font-size: 12px;
    }

    .step-button.active .step-number {
      background: var(--accent-2);
      color: #061412;
    }

    .step-title {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 800;
    }

    .step-next {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .details-grid {
      display: grid;
      gap: 10px;
    }

    .detail-row {
      border-left: 3px solid var(--border);
      padding-left: 10px;
      display: grid;
      gap: 4px;
    }

    .detail-row strong {
      font-size: 12px;
      color: var(--soft);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .detail-row span,
    .detail-row li {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
    }

    .detail-row ul {
      margin: 0;
      padding-left: 18px;
    }

    .json-toggle {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
    }

    .json-toggle:hover,
    .json-toggle:focus-visible {
      border-color: var(--accent-3);
    }

    .json-panel {
      display: none;
    }

    .json-panel.open {
      display: block;
    }

    .json-panel textarea {
      min-height: 240px;
      resize: vertical;
      color: #d7e2ed;
      font-family:
        "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: minmax(250px, 300px) minmax(420px, 1fr);
      }

      .inspector {
        grid-column: 1 / -1;
        position: static;
        height: auto;
      }

      .map-scroll {
        max-height: none;
      }
    }

    @media (max-width: 820px) {
      .topbar {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .top-actions {
        justify-content: start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
      }

      .map-stage {
        min-width: 0;
      }

      .screen-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="product-eyebrow">Product flow map</p>
        <h1 id="product-title">User Flow Map</h1>
        <p class="subtitle" id="product-description"></p>
      </div>
      <div class="top-actions" aria-label="Map totals">
        <div class="metric"><strong id="screen-count">0</strong><span>Screens</span></div>
        <div class="metric"><strong id="flow-count">0</strong><span>Flows</span></div>
        <div class="metric"><strong id="step-count">0</strong><span>Steps</span></div>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar" aria-label="Flows">
        <div class="panel-header">
          <h2>User Flows</h2>
          <p>Select a flow to highlight the screen sequence and step annotations.</p>
        </div>
        <div class="controls">
          <div class="field">
            <label for="flow-search">Search flows</label>
            <input id="flow-search" type="search" placeholder="Send, vault, settings">
          </div>
          <div class="field">
            <label for="group-filter">Screen group</label>
            <select id="group-filter"></select>
          </div>
        </div>
        <div class="flow-list" id="flow-list"></div>
      </aside>

      <section class="panel map-shell" aria-label="Screen map">
        <div class="map-toolbar">
          <div>
            <h2 id="map-title">Screens</h2>
          </div>
          <div class="legend" aria-label="Legend">
            <span class="legend-item"><span class="dot active"></span>In selected flow</span>
            <span class="legend-item"><span class="dot current"></span>Current step</span>
            <span class="legend-item"><span class="dot neutral"></span>Other screen</span>
          </div>
        </div>
        <div class="map-scroll" id="map-scroll">
          <div class="map-stage" id="map-stage">
            <svg class="path-layer" id="flow-lines" aria-hidden="true"></svg>
            <div id="screen-map"></div>
          </div>
        </div>
      </section>

      <aside class="panel inspector" aria-label="Flow details">
        <div class="panel-header">
          <h2>Flow Details</h2>
          <p id="inspector-summary">Choose a flow to inspect the user path.</p>
        </div>
        <div class="inspector-content" id="inspector"></div>
      </aside>
    </main>
  </div>

  <script id="product-flow-data" type="application/json">
{
  "product": {
    "name": "Ducat Wallet",
    "environment": "Mutinynet testnet",
    "description": "Interactive map of user-facing screens and flows in the Ducat Wallet mobile app. The UI below is generated from this JSON document: screens, flows, steps, transitions, data, system events, state changes, and outcomes."
  },
  "screenGroups": [
    "Entry and Auth",
    "Wallet Core",
    "Receive and Cashu",
    "Send and Turbo",
    "Vault",
    "Bridge and EVM",
    "Settings"
  ],
  "screens": [
    {
      "id": "app.splash",
      "name": "Splash / Startup Router",
      "group": "Entry and Auth",
      "type": "System screen",
      "route": "SplashScreen / RootNavigator",
      "description": "Initial loading state that resolves wallet, authentication, and navigation state."
    },
    {
      "id": "auth.welcome",
      "name": "Welcome and Wallet Setup",
      "group": "Entry and Auth",
      "type": "Onboarding",
      "route": "Auth > Onboarding > WelcomeScreen",
      "description": "Entry point for creating a passkey wallet, importing a seed phrase, or restoring with passkey."
    },
    {
      "id": "auth.import-seed",
      "name": "Import Seed Phrase",
      "group": "Entry and Auth",
      "type": "Onboarding mode",
      "route": "WelcomeScreen import mode",
      "description": "Seed phrase input path inside the welcome flow."
    },
    {
      "id": "auth.passkey-create",
      "name": "Create Passkey PIN",
      "group": "Entry and Auth",
      "type": "Secure input",
      "route": "Onboarding passkey_pin_create",
      "description": "Collects and confirms the PIN used to protect a passkey-backed wallet."
    },
    {
      "id": "auth.passkey-restore",
      "name": "Restore Passkey PIN",
      "group": "Entry and Auth",
      "type": "Secure input",
      "route": "Onboarding passkey_pin_restore",
      "description": "Collects the PIN needed to restore an existing passkey wallet session."
    },
    {
      "id": "auth.pin-setup",
      "name": "PIN Setup",
      "group": "Entry and Auth",
      "type": "Secure input",
      "route": "PinSetupScreen",
      "description": "Creates or changes the wallet PIN and optionally enables biometrics."
    },
    {
      "id": "auth.lock",
      "name": "Lock Screen",
      "group": "Entry and Auth",
      "type": "Authentication",
      "route": "LockScreen",
      "description": "Unlocks an existing wallet with PIN or biometrics."
    },
    {
      "id": "wallet.home",
      "name": "Dashboard / Wallet Home",
      "group": "Wallet Core",
      "type": "Dashboard",
      "route": "Main > WalletTab > WalletHome",
      "description": "Primary authenticated screen showing total value, BTC, UNIT, Cashu balances, vault card, actions, and bridge entry points."
    },
    {
      "id": "wallet.asset-detail",
      "name": "Asset Detail",
      "group": "Wallet Core",
      "type": "Detail screen",
      "route": "WalletStack > AssetDetail",
      "description": "Per-asset detail view for BTC, UNIT, USDC, ETH, or related balances."
    },
    {
      "id": "wallet.transaction-history",
      "name": "Transaction History",
      "group": "Wallet Core",
      "type": "Sheet",
      "route": "WalletPage transaction history sheet",
      "description": "Scrollable history sheet for wallet transactions and pending activity."
    },
    {
      "id": "wallet.deposit-sheet",
      "name": "Receive Asset Sheet",
      "group": "Wallet Core",
      "type": "Sheet",
      "route": "WalletPage DepositSheet",
      "description": "Asset selection sheet opened from Receive, used to choose BTC, UNIT, or other supported receive paths."
    },
    {
      "id": "wallet.withdraw-sheet",
      "name": "Send Asset Sheet",
      "group": "Wallet Core",
      "type": "Sheet",
      "route": "WalletPage WithdrawSheet",
      "description": "Asset selection sheet opened from Send before entering the send navigator."
    },
    {
      "id": "wallet.qr-scanner",
      "name": "QR Scanner",
      "group": "Wallet Core",
      "type": "Scanner",
      "route": "QRScanner",
      "description": "Scans payment requests, Cashu tokens, Turbo links, and wallet addresses."
    },
    {
      "id": "wallet.receive-qr",
      "name": "Receive QR",
      "group": "Wallet Core",
      "type": "Detail screen",
      "route": "WalletStack > ReceiveQR",
      "description": "Displays a selected receive address as QR plus copyable address details."
    },
    {
      "id": "wallet.vault-detail",
      "name": "Vault Detail",
      "group": "Wallet Core",
      "type": "Detail screen",
      "route": "WalletStack > VaultDetail",
      "description": "Shows current vault collateral, debt, health, and available vault operations."
    },
    {
      "id": "cashu.receive",
      "name": "Cashu Receive",
      "group": "Receive and Cashu",
      "type": "Receive flow",
      "route": "WalletStack > CashuReceive",
      "description": "Receives, mints, or claims Cashu e-cash tokens for UNIT or BTC."
    },
    {
      "id": "cashu.recover-mint",
      "name": "Recover Mint",
      "group": "Receive and Cashu",
      "type": "Recovery",
      "route": "WalletStack > RecoverMint",
      "description": "Recovery screen for mint state and unresolved Cashu balances."
    },
    {
      "id": "cashu.low-balance",
      "name": "Low E-cash Balance",
      "group": "Receive and Cashu",
      "type": "Modal",
      "route": "LowEcashBalanceModal",
      "description": "Warns when Cashu balance is below the configured threshold and offers top-up."
    },
    {
      "id": "cashu.conversion",
      "name": "E-cash Conversion",
      "group": "Receive and Cashu",
      "type": "Modal",
      "route": "EcashConversionModal",
      "description": "Confirms conversion from on-chain UNIT to Cashu UNIT when thresholds or top-ups require it."
    },
    {
      "id": "send.asset-selector",
      "name": "Send Asset Selector",
      "group": "Send and Turbo",
      "type": "Flow screen",
      "route": "SendFlow > AssetSelector",
      "description": "Chooses which asset and rail the user wants to send."
    },
    {
      "id": "send.input",
      "name": "Send Input",
      "group": "Send and Turbo",
      "type": "Flow screen",
      "route": "SendFlow > SendInput",

  <script>
    (() => {
      const rawData = document.getElementById("product-flow-data").textContent;
      const data = JSON.parse(rawData);
      const screensById = new Map(data.screens.map((screen) => [screen.id, screen]));
      const state = {
        selectedFlowId: data.flows[0] ? data.flows[0].id : null,
        selectedStepIndex: 0,
        selectedScreenId: null,
        query: "",
        group: "all",
        jsonOpen: false
      };

      const els = {
        productEyebrow: document.getElementById("product-eyebrow"),
        productTitle: document.getElementById("product-title"),
        productDescription: document.getElementById("product-description"),
        screenCount: document.getElementById("screen-count"),
        flowCount: document.getElementById("flow-count"),
        stepCount: document.getElementById("step-count"),
        flowSearch: document.getElementById("flow-search"),
        groupFilter: document.getElementById("group-filter"),
        flowList: document.getElementById("flow-list"),
        mapTitle: document.getElementById("map-title"),
        screenMap: document.getElementById("screen-map"),
        mapStage: document.getElementById("map-stage"),
        flowLines: document.getElementById("flow-lines"),
        inspectorSummary: document.getElementById("inspector-summary"),
        inspector: document.getElementById("inspector")
      };

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        })[char]);
      }

      function currentFlow() {
        return data.flows.find((flow) => flow.id === state.selectedFlowId) || data.flows[0] || null;
      }

      function currentStep() {
        const flow = currentFlow();
        return flow ? flow.steps[state.selectedStepIndex] || flow.steps[0] || null : null;
      }

      function screenName(screenId) {
        return screensById.get(screenId)?.name || screenId || "End";
      }

      function stepNumbersForScreen(flow, screenId) {
        if (!flow) return [];
        return flow.steps
          .map((step, index) => step.screen === screenId ? index + 1 : null)
          .filter(Boolean);
      }

      function uniqueScreenIdsForFlow(flow) {
        return new Set(flow ? flow.steps.map((step) => step.screen) : []);
      }

      function itemList(items) {
        const values = Array.isArray(items) ? items : items ? [items] : [];
        if (!values.length) return "<span>None</span>";
        return `<ul>${values.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
      }

      function renderChrome() {
        const totalSteps = data.flows.reduce((sum, flow) => sum + flow.steps.length, 0);
        els.productEyebrow.textContent = `${data.product.environment} / user movement map`;
        els.productTitle.textContent = `${data.product.name} User Flow Map`;
        els.productDescription.textContent = data.product.description;
        els.screenCount.textContent = data.screens.length;
        els.flowCount.textContent = data.flows.length;
        els.stepCount.textContent = totalSteps;
      }

      function renderGroupFilter() {
        const groups = data.screenGroups || Array.from(new Set(data.screens.map((screen) => screen.group)));
        els.groupFilter.innerHTML = [
          `<option value="all">All screen groups</option>`,
          ...groups.map((group) => `<option value="${escapeHtml(group)}">${escapeHtml(group)}</option>`)
        ].join("");
        els.groupFilter.value = state.group;
      }

      function filteredFlows() {
        const query = state.query.trim().toLowerCase();
        if (!query) return data.flows;
        return data.flows.filter((flow) => {
          const searchText = [
            flow.name,
            flow.goal,
            flow.trigger,
            flow.outcome,
            ...(flow.tags || [])
          ].join(" ").toLowerCase();
          return searchText.includes(query);
        });
      }

      function renderFlows() {
        const flows = filteredFlows();
        if (!flows.length) {
          els.flowList.innerHTML = `<div class="empty-state">No matching flows.</div>`;
          return;
        }

        els.flowList.innerHTML = flows.map((flow) => {
          const active = flow.id === state.selectedFlowId ? " active" : "";
          const tags = (flow.tags || []).slice(0, 3).map((tag) => `<span class="chip">${escapeHtml(tag)}</span>`).join("");
          return `
            <button class="flow-button${active}" type="button" data-flow-id="${escapeHtml(flow.id)}">
              <strong>${escapeHtml(flow.name)}</strong>
              <span>${escapeHtml(flow.goal)}</span>
              <span class="flow-meta">
                <span class="chip accent">${flow.steps.length} steps</span>
                ${tags}
              </span>
            </button>
          `;
        }).join("");
      }

      function filteredScreens() {
        return data.screens.filter((screen) => state.group === "all" || screen.group === state.group);
      }

      function renderScreens() {
        const flow = currentFlow();
        const activeStep = currentStep();
        const activeScreenIds = uniqueScreenIdsForFlow(flow);
        const groups = data.screenGroups || Array.from(new Set(data.screens.map((screen) => screen.group)));
        const screens = filteredScreens();

        els.mapTitle.textContent = flow ? `${flow.name}: screen sequence` : "Screens";

        const sections = groups
          .map((group) => {
            const groupScreens = screens.filter((screen) => screen.group === group);
            if (!groupScreens.length) return "";
            const cards = groupScreens.map((screen) => {
              const inFlow = activeScreenIds.has(screen.id);
              const isCurrent = activeStep && activeStep.screen === screen.id;
              const isSelected = state.selectedScreenId === screen.id;
              const classes = [
                "screen-card",
                inFlow ? "in-flow" : "",
                isCurrent || isSelected ? "current" : ""
              ].filter(Boolean).join(" ");
              const badges = stepNumbersForScreen(flow, screen.id)
                .map((number) => `<span class="step-badge">${number}</span>`)
                .join("");
              return `
                <button class="${classes}" type="button" data-screen-card="${escapeHtml(screen.id)}" data-screen-id="${escapeHtml(screen.id)}">
                  <span class="screen-type">${escapeHtml(screen.type)}</span>
                  <h4>${escapeHtml(screen.name)}</h4>
                  <p>${escapeHtml(screen.description)}</p>
                  ${badges ? `<div class="badges" aria-label="Flow step numbers">${badges}</div>` : ""}
                </button>
              `;
            }).join("");
            return `
              <section class="group-section" aria-label="${escapeHtml(group)} screens">
                <div class="group-title">
                  <h3>${escapeHtml(group)}</h3>
                  <span>${groupScreens.length} screens</span>
                </div>
                <div class="screen-grid">${cards}</div>
              </section>
            `;
          })
          .join("");

        els.screenMap.innerHTML = sections || `<div class="empty-state">No screens in this group.</div>`;
        requestAnimationFrame(drawConnectors);
      }

      function renderInspector() {
        const flow = currentFlow();
        if (!flow) {
          els.inspector.innerHTML = `<div class="empty-state">No flow data is available.</div>`;
          return;
        }

        const step = currentStep();
        const screen = step ? screensById.get(step.screen) : null;
        const selectedScreen = state.selectedScreenId ? screensById.get(state.selectedScreenId) : null;
        els.inspectorSummary.textContent = flow.goal;

        const timeline = flow.steps.map((item, index) => {
          const active = index === state.selectedStepIndex ? " active" : "";
          return `
            <button class="step-button${active}" type="button" data-step-index="${index}">
              <span class="step-number">${index + 1}</span>
              <span>
                <span class="step-title">${escapeHtml(item.title || screenName(item.screen))}</span>
                <span class="step-next">${escapeHtml(screenName(item.screen))}${item.nextScreen ? ` > ${escapeHtml(screenName(item.nextScreen))}` : " > Outcome"}</span>
              </span>
            </button>
          `;
        }).join("");

        const stepDetails = step ? `
          <div class="section">
            <h3>Current Step Annotation</h3>
            <div class="details-grid">
              <div class="detail-row"><strong>Screen</strong><span>${escapeHtml(screenName(step.screen))}</span></div>
              <div class="detail-row"><strong>User action</strong><span>${escapeHtml(step.userAction)}</span></div>
              <div class="detail-row"><strong>Data entered or passed</strong>${itemList(step.data)}</div>
              <div class="detail-row"><strong>Backend or system events</strong>${itemList(step.systemEvents)}</div>
              <div class="detail-row"><strong>State changes</strong>${itemList(step.stateChanges)}</div>
              <div class="detail-row"><strong>Next</strong><span>${escapeHtml(step.nextScreen ? screenName(step.nextScreen) : flow.outcome)}</span></div>
              <div class="detail-row"><strong>Transition</strong><span>${escapeHtml(step.transition)}</span></div>
            </div>
          </div>
        ` : "";

        const selectedScreenDetails = selectedScreen ? `
          <div class="section">
            <h3>Selected Screen</h3>
            <div class="details-grid">
              <div class="detail-row"><strong>Name</strong><span>${escapeHtml(selectedScreen.name)}</span></div>
              <div class="detail-row"><strong>Route</strong><span>${escapeHtml(selectedScreen.route)}</span></div>
              <div class="detail-row"><strong>Group</strong><span>${escapeHtml(selectedScreen.group)}</span></div>
              <div class="detail-row"><strong>Description</strong><span>${escapeHtml(selectedScreen.description)}</span></div>
            </div>
          </div>
        ` : screen ? `
          <div class="section">
            <h3>Current Screen</h3>
            <div class="details-grid">
              <div class="detail-row"><strong>Route</strong><span>${escapeHtml(screen.route)}</span></div>
              <div class="detail-row"><strong>Type</strong><span>${escapeHtml(screen.type)}</span></div>
              <div class="detail-row"><strong>Description</strong><span>${escapeHtml(screen.description)}</span></div>
            </div>
          </div>
        ` : "";

        els.inspector.innerHTML = `
          <div class="section">
            <h3>${escapeHtml(flow.name)}</h3>
            <p>${escapeHtml(flow.trigger)}</p>
            <div class="flow-meta">
              <span class="chip accent">${flow.steps.length} steps</span>
              <span class="chip">${escapeHtml(flow.persona)}</span>
              ${(flow.tags || []).map((tag) => `<span class="chip">${escapeHtml(tag)}</span>`).join("")}
            </div>
          </div>
          <div class="section">
            <h3>Sequence</h3>
            <div class="timeline">${timeline}</div>
          </div>
          ${stepDetails}
          <div class="section">
            <h3>Final Outcome</h3>
            <p>${escapeHtml(flow.outcome)}</p>
          </div>
          ${selectedScreenDetails}
          <button class="json-toggle" type="button" id="json-toggle">${state.jsonOpen ? "Hide JSON data" : "View JSON data"}</button>
          <div class="json-panel${state.jsonOpen ? " open" : ""}" id="json-panel">
            <label class="sr-only" for="json-data">Embedded JSON data</label>
            <textarea id="json-data" readonly>${escapeHtml(JSON.stringify(data, null, 2))}</textarea>
          </div>
        `;
      }

      function getCardByScreenId(screenId) {
        return Array.from(els.mapStage.querySelectorAll("[data-screen-card]"))
          .find((card) => card.dataset.screenCard === screenId);
      }

      function drawConnectors() {
        const flow = currentFlow();
        els.flowLines.innerHTML = "";
        if (!flow || !flow.steps.length) return;

        const stageRect = els.mapStage.getBoundingClientRect();
        const width = Math.max(els.mapStage.scrollWidth, els.mapStage.clientWidth);
        const height = Math.max(els.mapStage.scrollHeight, els.mapStage.clientHeight);
        els.flowLines.setAttribute("viewBox", `0 0 ${width} ${height}`);
        els.flowLines.setAttribute("width", width);
        els.flowLines.setAttribute("height", height);

        const namespace = "http://www.w3.org/2000/svg";
        const defs = document.createElementNS(namespace, "defs");
        const marker = document.createElementNS(namespace, "marker");
        marker.setAttribute("id", "arrowhead");
        marker.setAttribute("markerWidth", "10");
        marker.setAttribute("markerHeight", "10");
        marker.setAttribute("refX", "8");
        marker.setAttribute("refY", "3");
        marker.setAttribute("orient", "auto");
        marker.setAttribute("markerUnits", "strokeWidth");
        const arrow = document.createElementNS(namespace, "path");
        arrow.setAttribute("d", "M 0 0 L 8 3 L 0 6 z");
        arrow.setAttribute("fill", "rgba(247, 147, 26, 0.86)");
        marker.appendChild(arrow);
        defs.appendChild(marker);
        els.flowLines.appendChild(defs);

        const points = flow.steps.map((step) => {
          const card = getCardByScreenId(step.screen);
          if (!card) return null;
          const rect = card.getBoundingClientRect();
          return {
            x: rect.left - stageRect.left + rect.width / 2 + els.mapStage.scrollLeft,
            y: rect.top - stageRect.top + rect.height / 2 + els.mapStage.scrollTop,
            screen: step.screen
          };
        });

        for (let index = 0; index < points.length - 1; index += 1) {
          const start = points[index];
          const end = points[index + 1];
          if (!start || !end || start.screen === end.screen) continue;
          const path = document.createElementNS(namespace, "path");
          const midX = (start.x + end.x) / 2;
          const distance = Math.abs(end.y - start.y) + Math.abs(end.x - start.x);
          const bend = Math.min(120, Math.max(48, distance * 0.16));
          const c1x = midX;
          const c1y = start.y + (end.y >= start.y ? bend : -bend);
          const c2x = midX;
          const c2y = end.y - (end.y >= start.y ? bend : -bend);
          path.setAttribute("d", `M ${start.x} ${start.y} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${end.x} ${end.y}`);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", "rgba(247, 147, 26, 0.58)");
          path.setAttribute("stroke-width", "3");
          path.setAttribute("stroke-linecap", "round");
          path.setAttribute("marker-end", "url(#arrowhead)");
          els.flowLines.appendChild(path);
        }
      }

      function render() {
        renderChrome();
        renderGroupFilter();
        renderFlows();
        renderScreens();
        renderInspector();
      }

      els.flowSearch.addEventListener("input", (event) => {
        state.query = event.target.value;
        renderFlows();
      });

      els.groupFilter.addEventListener("change", (event) => {
        state.group = event.target.value;
        renderScreens();
      });

      els.flowList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-flow-id]");
        if (!button) return;
        state.selectedFlowId = button.dataset.flowId;
        state.selectedStepIndex = 0;
        state.selectedScreenId = null;
        state.group = "all";
        els.groupFilter.value = "all";
        render();
      });

      els.screenMap.addEventListener("click", (event) => {
        const button = event.target.closest("[data-screen-id]");
        if (!button) return;
        state.selectedScreenId = button.dataset.screenId;
        const flow = currentFlow();
        const stepIndex = flow ? flow.steps.findIndex((step) => step.screen === state.selectedScreenId) : -1;
        if (stepIndex >= 0) state.selectedStepIndex = stepIndex;
        renderScreens();
        renderInspector();
      });

      els.inspector.addEventListener("click", (event) => {
        const stepButton = event.target.closest("[data-step-index]");
        if (stepButton) {
          state.selectedStepIndex = Number(stepButton.dataset.stepIndex);
          const step = currentStep();
          state.selectedScreenId = step ? step.screen : null;
          renderScreens();
          renderInspector();
          return;
        }

        const jsonButton = event.target.closest("#json-toggle");
        if (jsonButton) {
          state.jsonOpen = !state.jsonOpen;
          renderInspector();
        }
      });

      window.addEventListener("resize", () => requestAnimationFrame(drawConnectors));
      document.getElementById("map-scroll").addEventListener("scroll", () => requestAnimationFrame(drawConnectors));

      render();
    })();
  </script>
</body>
</html>
